# Optional Docker Compose override for GELF logging.
# Use with the root compose file, for example:
#   docker compose -f docker-compose.yml -f examples/docker-compose.gelf.yml up -d
# This file is not a complete stack on its own.
services:
  shell:
    logging:
      driver: gelf
      options:
        gelf-address: "${DOCKER_GELF_ADDRESS}"
