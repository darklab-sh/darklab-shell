# Optional production Docker Compose override.
# Use with the root compose file, for example:
#   docker compose -f docker-compose.yml -f examples/docker-compose.prod.yml up -d
# This file is not a complete stack on its own.
services:
  shell:
    container_name: shell.darklab.sh
    ports: !reset []
    expose:
      - "${APP_PORT:-8888}"
    environment:
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-8}
      - WEB_THREADS=${WEB_THREADS:-4}
      - VIRTUAL_HOST=shell.darklab.sh
      - LETSENCRYPT_HOST=shell.darklab.sh
    ulimits:
      nofile:
        soft: 65535  # per-process soft limit on open file descriptors; scanner tools open one fd per probe
        hard: 65535  # hard ceiling the process can raise itself to; must match soft for scanners that set their own limits
    sysctls:
      net.ipv4.ip_local_port_range: "1024 65535"   # widen ephemeral port range (default ~32768-60999) so scanners have more source ports
      net.ipv4.tcp_tw_reuse: 1                     # allow TIME_WAIT sockets to be reused for new outbound connections
      net.ipv4.tcp_fin_timeout: 15                 # reduce FIN_WAIT_2 timeout from 60s default so sockets are released faster
      net.ipv4.tcp_max_tw_buckets: 131072          # raise TIME_WAIT bucket ceiling before kernel starts silently dropping sockets
    logging:
      driver: gelf
      options:
        gelf-address: "${DOCKER_GELF_ADDRESS:-udp://loghost.darklab.sh:12201/}"
  redis:
    container_name: shell.darklab.sh-redis
    logging:
      driver: gelf
      options:
        gelf-address: "${DOCKER_GELF_ADDRESS:-udp://loghost.darklab.sh:12201/}"

networks:
  default:
    external: true
    name: darklab-net
