services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  shell:
    build:
      context: ..
      dockerfile: Dockerfile
    image: shell-darklab
    container_name: shell-darklab
    ports:
      - "8888:8888"
    volumes:
      - ../app:/app:ro
      - ../data:/data
    tmpfs:
      - /tmp
    cap_add:
      - NET_RAW
      - NET_ADMIN
    read_only: true
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
