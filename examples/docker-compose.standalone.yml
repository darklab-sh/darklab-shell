services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp

  shell:
    build:
      context: ..
      dockerfile: Dockerfile
    image: shell-darklab
    container_name: shell-darklab
    ports:
      - "8888:8888"
    volumes:
      - ../app:/app:ro
      - ../data:/data
    tmpfs:
      - /tmp
    cap_add:
      - NET_RAW
      - NET_ADMIN
    read_only: true
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
