context:
  grep:
    pipe_command: true
    pipe_description: Filter lines by pattern
    flags:
      - value: -i
        description: Ignore case
      - value: -v
        description: Invert match
      - value: -E
        description: Extended regex
    arg_hints:
      "__positional__":
        - value: "<pattern>"
          description: Text or regex to match

  head:
    pipe_command: true
    pipe_description: Show the first lines
    flags:
      - value: -n
        description: Show the first N lines
    expects_value:
      - -n
    arg_hints:
      "-n":
        - value: "5"
          description: Show the first 5 lines
        - value: "10"
          description: Show the first 10 lines
        - value: "20"
          description: Show the first 20 lines
        - value: "50"
          description: Show the first 50 lines

  tail:
    pipe_command: true
    pipe_description: Show the last lines
    flags:
      - value: -n
        description: Show the last N lines
    expects_value:
      - -n
    arg_hints:
      "-n":
        - value: "5"
          description: Show the last 5 lines
        - value: "10"
          description: Show the last 10 lines
        - value: "20"
          description: Show the last 20 lines
        - value: "50"
          description: Show the last 50 lines

  wc:
    pipe_command: true
    pipe_insert_value: "wc -l"
    pipe_label: "wc -l"
    pipe_description: Count lines
    flags:
      - value: -l
        description: Count lines

  nmap:
    flags:
      - value: -sT
        description: TCP connect scan
      - value: -sV
        description: Service/version detection
      - value: -Pn
        description: Skip host discovery
      - value: -p
        description: Ports to scan
      - value: --script
        description: Run NSE script or script category
      - value: --top-ports
        description: Scan common ports
      - value: -T4
        description: Faster timing template
      - value: -A
        description: Aggressive detection bundle
      - value: -n
        description: Do not resolve DNS names
      - value: -vv
        description: More verbose output
    expects_value:
      - -p
      - --script
      - --top-ports
    arg_hints:
      "-p":
        - value: "80,443"
          description: Common web ports
        - value: "1-1000"
          description: First thousand TCP ports
        - value: "<ports>"
          description: Comma-separated ports or ranges
      "--script":
        - value: "http-headers"
          description: Fetch HTTP response headers
        - value: "http-title"
          description: Fetch HTTP page title
        - value: "ssl-cert"
          description: Inspect the TLS certificate
        - value: "ssl-enum-ciphers"
          description: Enumerate supported TLS ciphers
        - value: "vuln"
          description: Run vulnerability-focused scripts
      "--top-ports":
        - value: "100"
          description: Top hundred ports
        - value: "1000"
          description: Top thousand ports
        - value: "<number>"
          description: Number of top ports to scan
      "__positional__":
        - value: "<target>"
          description: Hostname, IP, or CIDR

  ffuf:
    flags:
      - value: -u
        description: Target URL with FUZZ marker
      - value: -w
        description: Wordlist path
      - value: -mc
        description: Match status codes
      - value: -fc
        description: Filter status codes
      - value: -H
        description: Add request header
      - value: -t
        description: Concurrent threads
    expects_value:
      - -u
      - -w
      - -mc
      - -fc
      - -H
      - -t
    arg_hints:
      "-u":
        - value: "<url-with-FUZZ>"
          description: Target URL including FUZZ
      "-w":
        - value: "/usr/share/wordlists/seclists/Discovery/Web-Content/common.txt"
          description: Common web-content wordlist
      "__positional__":
        - value: "<target-url>"
          description: Usually provided through -u

  curl:
    flags:
      - value: -I
        description: HEAD request only
      - value: -s
        description: Silent mode
      - value: -v
        description: Verbose request and response details
      - value: -o
        description: Write body to file
      - value: -w
        description: Write selected metadata after the transfer
      - value: -H
        description: Add request header
      - value: -L
        description: Follow redirects
      - value: -k
        description: Skip TLS verification
      - value: --max-time
        description: Maximum transfer time in seconds
    expects_value:
      - -o
      - -w
      - -H
      - --max-time
    arg_hints:
      "-o":
        - value: "/dev/null"
          description: Discard body and keep metadata
      "-w":
        - value: "\"%{http_code}\""
          description: Print the final HTTP status code
        - value: "\"%{remote_ip} %{http_code}\""
          description: Print remote IP and status code
      "-H":
        - value: "\"User-Agent: Mozilla/5.0\""
          description: Example browser-style user agent
        - value: "\"Authorization: Bearer <token>\""
          description: Example bearer token header
      "--max-time":
        - value: "10"
          description: Ten-second transfer limit
      "__positional__":
        - value: "https://"
          description: Start an HTTP or HTTPS URL

  dig:
    flags:
      - value: +short
        description: Short answer output
      - value: +trace
        description: Trace delegation path
      - value: "@8.8.8.8"
        description: Query a specific resolver
      - value: AXFR
        description: Attempt zone transfer
      - value: AAAA
        description: IPv6 address lookup
      - value: MX
        description: Mail exchanger lookup
    arg_hints:
      "__positional__":
        - value: "<domain>"
          description: Domain name to query

  nuclei:
    flags:
      - value: -u
        description: Single target URL
      - value: -l
        description: File with targets
      - value: -t
        description: Template or template directory
      - value: -severity
        description: Filter by severity
      - value: -tags
        description: Filter by tags
      - value: -rl
        description: Rate limit requests
    expects_value:
      - -u
      - -l
      - -t
      - -severity
      - -tags
      - -rl
    arg_hints:
      "-severity":
        - value: "low,medium,high,critical"
          description: Comma-separated severities
      "__positional__":
        - value: "<target>"
          description: Usually provided through -u or -l

  ping:
    flags:
      - value: -c
        description: Stop after count replies
      - value: -i
        description: Wait interval seconds between probes
      - value: -W
        description: Per-packet timeout in seconds
      - value: -w
        description: Deadline before ping exits
    expects_value:
      - -c
      - -i
      - -W
      - -w
    arg_hints:
      "-c":
        - value: "4"
          description: Send four probes
        - value: "10"
          description: Send ten probes
      "-i":
        - value: "0.5"
          description: Half-second probe interval
      "__positional__":
        - value: "<host>"
          description: Hostname or IP address to probe

  nc:
    flags:
      - value: -z
        description: Zero-I/O mode for port scanning
      - value: -v
        description: Verbose connection results
      - value: -w
        description: Timeout before giving up
    expects_value:
      - -w
    arg_hints:
      "-w":
        - value: "3"
          description: Short timeout in seconds
      "__positional__":
        - value: "<host>"
          description: Hostname or IP followed by one or more ports

  nslookup:
    flags:
      - value: -type=A
        description: IPv4 address lookup
      - value: -type=AAAA
        description: IPv6 address lookup
      - value: -type=MX
        description: Mail exchanger lookup
      - value: -type=TXT
        description: TXT record lookup
      - value: -type=NS
        description: Name server lookup
      - value: -type=CNAME
        description: Canonical name lookup
      - value: -debug
        description: Print extra resolver details
    arg_hints:
      "__positional__":
        - value: "<domain>"
          description: Domain name to query

  host:
    flags:
      - value: -t
        description: Select DNS record type
    expects_value:
      - -t
    arg_hints:
      "-t":
        - value: "A"
          description: IPv4 address lookup
        - value: "AAAA"
          description: IPv6 address lookup
        - value: "MX"
          description: Mail exchanger lookup
        - value: "TXT"
          description: TXT record lookup
        - value: "NS"
          description: Name server lookup
      "__positional__":
        - value: "<domain>"
          description: Domain name to query

  traceroute:
    flags:
      - value: -n
        description: Do not resolve hop addresses
      - value: -m
        description: Set maximum hop count
      - value: -w
        description: Wait timeout per probe
      - value: -q
        description: Number of probes per hop
      - value: -f
        description: Set the first hop TTL
      - value: -I
        description: Use ICMP ECHO probes
      - value: -T
        description: Use TCP SYN probes
    expects_value:
      - -f
      - -m
      - -w
      - -q
    arg_hints:
      "-f":
        - value: "1"
          description: Start probing from the first hop
