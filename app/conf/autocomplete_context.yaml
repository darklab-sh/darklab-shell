# Unified autocomplete configuration.
#
# This file is now the single runtime source for both:
# - flat whole-command suggestions
# - command-root-aware contextual suggestions
#
# Top-level shape:
# flat_suggestions:
#   - "nmap -sV target"
#   - "curl -I https://example.com"
#
# context:
#   <command-root>:
#     flags:
#       - value: <flag-or-token>
#         description: <short help text>
#     expects_value:
#       - <flag-that-consumes-the-next-token>
#     arg_hints:
#       "<flag>":
#         - value: <suggested-value>
#           description: <short help text>
#       "__positional__":
#         - value: <positional-placeholder-or-example>
#           description: <short help text>
#
# Meaning:
# - flat_suggestions:
#   the old whole-command dropdown corpus. Use this for helper commands, full
#   example invocations, and simple prefix suggestions.
#
# - context:
#   token-aware suggestions that activate once the command root is known.
#
# - flags:
#   suggestions shown when the current token looks like a flag position for the
#   command root, e.g. `nmap -` or `ffuf -`.
#
# - expects_value:
#   flags whose next token should be treated as a value slot rather than another
#   flag slot. Example:
#     curl -o <cursor>
#   If `-o` is listed here, autocomplete uses arg_hints["-o"] instead of
#   continuing to suggest more curl flags.
#
# - arg_hints:
#   optional value hints shown after a specific flag, or generic positional
#   hints exposed through the special key "__positional__".
#
# Authoring rules:
# - Prefer flat_suggestions for:
#   - helper commands (`help`, `status`, `history`)
#   - full command examples
#   - simple discovery where token-aware logic adds little value
# - Prefer context entries for:
#   - flag-heavy tools like `nmap`, `curl`, `wget`, `ffuf`
#   - commands where the next useful token depends on the current flag
#   - commands that benefit from a visible positional hint after `command `
# - Use expects_value when the next token should stop showing more flags and
#   instead show value hints for the active flag.
# - Use arg_hints["__positional__"] for normal unflagged arguments such as
#   targets, hosts, URLs, domains, or CIDR ranges.
# - For arg_hints values, prefer:
#   - concrete examples when prefix matching should work (`https://`, `/dev/null`)
#   - placeholders when the goal is explanatory guidance (`<target>`, `<domain>`)
# - Positional placeholders are now shown alongside flags at `command `, so
#   `__positional__` can be explanatory without relying only on prefix matches.
#
# "__positional__" means:
#   use these hints when the current token is a normal non-flag argument and no
#   more specific flag-value hint is taking priority. Examples:
#     dig <cursor>        -> use dig.arg_hints["__positional__"]
#     nmap example.com    -> use nmap.arg_hints["__positional__"]
#     curl https://<c>    -> use curl.arg_hints["__positional__"]
#   It is also shown alongside flags when the user is at `command ` so the
#   required positional argument stays discoverable before typing begins.
#
# Example patterns:
#
# Minimal flag-only command:
# context:
#   demo:
#     flags:
#       - value: --json
#         description: Output JSON
#
# Flag expecting a value:
# context:
#   curl:
#     flags:
#       - value: -H
#         description: Add request header
#     expects_value:
#       - -H
#     arg_hints:
#       "-H":
#         - value: "Authorization: Bearer <token>"
#           description: Example auth header
#
# Positional hints:
# context:
#   dig:
#     arg_hints:
#       "__positional__":
#         - value: "<domain>"
#           description: Domain name to query
#
# Narrow built-in pipe support:
# context:
#   grep:
#     pipe_command: true
#     pipe_description: Filter lines by pattern
#     flags:
#       - value: -i
#         description: Ignore case
#
# `pipe_command: true` means the entry is also suggested after `command |`.
# `pipe_insert_value` can override what gets inserted there. For example,
# `wc` can suggest `wc -l` directly because that is the only supported form.

