# Welcome message shown on page load.
# Each block types out as a command in the terminal output area.
#
#   cmd:  the text typed out (a $ prompt is prepended automatically)
#   out:  optional description line shown beneath the command (optional)
#
# Remove or empty this file to disable the welcome message entirely.

- cmd: "# shell.darklab.sh — network diagnostics in your browser"

- cmd: "ping -c 4 8.8.8.8"
  out: "  check connectivity and round-trip latency to any host"

- cmd: "nc -zv example.com 443"
  out: "  test whether a specific TCP port is open and reachable"

- cmd: "nmap -sV --open example.com"
  out: "  discover open ports and identify running services"

- cmd: "mtr --report-wide example.com"
  out: "  trace the network path, measuring latency at each hop"

- cmd: "dig example.com A"
  out: "  DNS lookup — resolve hostnames, query A/MX/TXT records"

- cmd: "curl -I https://example.com"
  out: "  fetch HTTP response headers to inspect server and status"

- cmd: "# type any command above to run it — see ? FAQ for the full list"
