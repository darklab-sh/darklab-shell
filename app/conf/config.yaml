# darklab_shell — Configuration
# ----------------------------------
# Changes to this file take effect after a container restart (docker compose restart).
# No rebuild is needed.
# Optional: add sibling *.local.* files for untracked server-specific overrides.
# Examples: app/conf/config.local.yaml, app/conf/allowed_commands.local.txt,
# app/conf/ascii.local.txt, app/conf/autocomplete_context.local.yaml,
# app/conf/app_hints.local.txt, app/conf/faq.local.yaml,
# app/conf/welcome.local.yaml, app/conf/themes/<name>.local.yaml.
# If present, each local overlay is applied after its checked-in base file.
# Text/config lists append local entries; ASCII art files use the local file if
# present; YAML config dictionaries merge key-by-key.

# ── Branding ──────────────────────────────────────────────────────────────────

# Name displayed in the browser tab, header, and permalink pages
# Server default if unset: "darklab_shell"
# app_name: "darklab_shell"

# Prompt identity shown at the start of the terminal prompt and welcome samples.
# The UI appends ":~ $" when workspaces are disabled and ":<workspace path> $"
# when workspaces are enabled.
# Server default if unset: "anon@darklab.sh"
# prompt_prefix: "anon@darklab.sh"

# Optional message shown at the top of the terminal on page load.
# Leave empty to disable.
# Server default if unset: ""
# motd: ""

# ── Appearance ────────────────────────────────────────────────────────────────

# Default color theme filename. Should match a file under app/conf/themes/.
# If unset or invalid, the built-in fallback palette is used.
# default_theme: darklab_obsidian.yaml

# ── History & Retention ───────────────────────────────────────────────────────

# Number of runs shown in the history drawer per session (UI display limit only —
# the database always stores everything until purged by the retention policy below)
# Server default if unset: 50
# history_panel_limit: 50

# Number of recent commands surfaced in the Recent row
# (desktop rail chips; mobile peek row and pull-up recents sheet)
# Server default if unset: 50
# recent_commands_limit: 50

# Directory used for SQLite history and compressed full-output artifacts.
# Leave unset for auto-detect: use /data when it is writable, otherwise fall
# back to /tmp for local/dev runs. If set explicitly, startup requires the
# directory to be writable.
# Server default if unset: auto (/data if writable, otherwise /tmp)
# data_dir: /data

# Enable the built-in basic redaction model for snapshot permalinks and local
# export actions (`save txt` / `save html`). When enabled, the app applies a
# conservative built-in baseline before any operator-defined rules:
#   - bearer tokens / Authorization: Bearer ...
#   - email addresses
#   - IPv4 addresses
#   - IPv6 addresses
#   - hostnames / dotted domains
# The app then appends any operator-defined rules from `share_redaction_rules`.
# Normal run history remains unchanged in this first version.
# Server default if unset: true
# share_redaction_enabled: true
#
# Optional operator-defined regex rules appended after the built-in share/export
# redaction rules.
# Each rule supports:
#   label:       optional human-readable name
#   pattern:     required regular expression
#   replacement: replacement text (default: [redacted])
#   flags:       optional regex flags from: i, m
# Server default if unset: []
# share_redaction_rules:
#   - label: bearer token
#     pattern: 'Bearer\s+\S+'
#     replacement: 'Bearer [redacted]'
#     flags: i
#   - label: ipv4
#     pattern: '\b\d{1,3}(?:\.\d{1,3}){3}\b'
#     replacement: '[ip-redacted]'

# Permalink retention in days. Runs and snapshots older than this will be
# deleted from the database on startup. Set to 0 for unlimited retention.
# Server default if unset: 365
# permalink_retention_days: 365

# ── Per-session Workspace Storage ────────────────────────────────────────────
#
# Optional app-mediated file storage for file-enabled commands and UI.
# helpers. This does not enable shell navigation or redirection by itself.
# Server default if unset: false
# workspace_enabled: false
#
# Storage backend label. `tmpfs` is intended for short-lived in-memory storage;
# `volume` is intended for a Docker-mounted bind mount or named volume.
# The backend value documents operator intent; `workspace_root` controls the
# actual filesystem location and does not create a Docker mount by itself.
# Server default if unset: tmpfs
# workspace_backend: tmpfs
#
# Root directory that will contain hashed per-session workspace directories.
# Never point this at the app source tree, SQLite data directory, or host root.
# Session directories are created sticky + setgid, and files are group-readable
# for the app/scanner shared group without being world-readable.
# The Docker entrypoint normalizes WORKSPACE_ROOT ownership and permissions
# before dropping to appuser. If you change this value, also update the matching
# WORKSPACE_ROOT environment variable in docker-compose.yml, a Compose override,
# or .env. .env is optional; it only supplies values consumed by Compose.
# Server default if unset: /tmp/darklab_shell-workspaces
# workspace_root: /tmp/darklab_shell-workspaces
#
# Per-session byte quota expressed in megabytes.
# Server default if unset: 50
# workspace_quota_mb: 50
#
# Maximum size for a single app-mediated text file in megabytes.
# Server default if unset: 5
# workspace_max_file_mb: 5
#
# Maximum number of files in one session workspace.
# Server default if unset: 100
# workspace_max_files: 100
#
# Remove inactive session workspaces after this many hours. Set to 0 to disable
# age-based cleanup, though quotas still apply.
# Server default if unset: 1
# workspace_inactivity_ttl_hours: 1

# ── Logging ───────────────────────────────────────────────────────────────────

# Log verbosity level . Options: ERROR, WARN, INFO, DEBUG
# ERROR — application errors only (spawn failures, health check failures, stream errors)
# WARN  — errors plus warnings: denied commands, rate limit hits, command timeouts
# INFO  — warnings plus operational events: run start/end/kill with client IP (default)
# DEBUG — everything: every HTTP request/response, command rewrites, share creation, kill misses
# Server default if unset: INFO
# log_level: INFO

# Log output format. Options: text, gelf
# text — human-readable key=value lines, suitable for Docker stdout / local dev
# gelf — newline-delimited GELF 1.1 JSON for Graylog / GELF-compatible back-ends
#         short_message contains the event name; all context is in _-prefixed fields
# Server default if unset: text
# log_format: text

# ── Trusted Proxies ──────────────────────────────────────────────────────────

# IPs or CIDR ranges that are allowed to supply X-Forwarded-For values.
# Requests from outside these ranges ignore forwarded headers and use the
# direct connection IP instead. The default keeps loopback trusted for local
# development and tests; production should list the actual reverse proxy subnet
# here if it is not already covered.
# trusted_proxy_cidrs:
#   - 127.0.0.1/32
#   - ::1/128

# ── Operator Diagnostics ─────────────────────────────────────────────────────
#
# GET /diag returns a JSON summary of app version, operational config, SQLite
# health and row counts, Redis connectivity, vendor-asset source (built-in vs
# fallback), and per-tool availability derived from the allowlist.
#
# The endpoint returns 404 to all callers unless the resolved client IP falls
# within one of the CIDRs listed here. Client IP resolution uses the same
# trusted-proxy rules as the rest of the app: X-Forwarded-For is only honored
# when the direct peer IP is inside trusted_proxy_cidrs. Leave the list empty
# (the default) to keep the endpoint fully hidden.
#
# Typical values:
#   172.16.0.0/12  — Docker bridge / overlay networks (recommended for host access)
#   10.0.0.0/8     — private LAN / VPN range
#
# If you are behind a reverse proxy, also make sure trusted_proxy_cidrs covers
# that proxy address/range; otherwise forwarded client IPs are ignored and the
# proxy peer IP is used instead.
#
# Server default if unset: [] (disabled)
# diagnostics_allowed_cidrs:
#   - 172.16.0.0/12

# ── Restricted Command Inputs ────────────────────────────────────────────────

# IPs or CIDR ranges that should be rejected when supplied as command targets.
# This applies only to command slots explicitly marked with host/domain/IP/CIDR
# value metadata in commands.yaml, including inspectable workspace input files
# passed through declared read flags. Domain names are not DNS-resolved here;
# this policy blocks literal IP/CIDR values and literal IPs embedded in URLs or
# host:port values.
#
# Typical values:
#   169.254.169.254/32 — cloud metadata service
#   127.0.0.0/8        — IPv4 loopback range
#   ::1/128            — IPv6 loopback address
#
# Server default if unset: [] (disabled)
# restricted_command_input_cidrs:
#   - 169.254.169.254/32

# ── Rate Limiting ─────────────────────────────────────────────────────────────

# Whether the /run rate limiter is active at all. Set to false for test-only or
# maintenance overlays where you want the app to accept runs without throttling.
# Server default if unset: true
# rate_limit_enabled: true

# Maximum number of /run requests per minute per IP
# Server default if unset: 30
# rate_limit_per_minute: 30

# Maximum number of /run requests per second per IP
# Server default if unset: 5
# rate_limit_per_second: 5

# ── Terminal ──────────────────────────────────────────────────────────────────

# Maximum number of tabs a user can have open at once.
# Set to 0 for unlimited.
# Server default if unset: 8
# max_tabs: 8

# Maximum number of output lines retained per tab. Older lines are dropped
# from the top to prevent the browser slowing down on verbose commands.
# Set to 0 for unlimited.
# Server default if unset: 5000
# max_output_lines: 5000

# Persist the full output of completed runs as compressed artifact files under /data.
# The history drawer and normal run permalink continue to use the capped preview stored
# in SQLite; this enables a separate "view full output" page for completed runs.
# Server default if unset: true
# persist_full_run_output: true

# Hard cap for persisted full-output artifacts, expressed in megabytes.
# The app multiplies this value by 1024*1024 internally. Set to 0 for unlimited.
# If the artifact reaches this limit, the full-output page remains available but
# includes a truncation notice.
# Server default if unset: 5 MB
# full_output_max_mb: 5MB

# Automatically kill a running command after this many seconds.
# Set to 0 to disable (commands run until they finish or are killed manually).
# Server default if unset: 3600
# command_timeout_seconds: 3600

# How often (in seconds) to send a heartbeat comment on idle SSE connections
# to prevent nginx and the browser from dropping the connection.
# Server default if unset: 20
# heartbeat_interval_seconds: 20

# ── Welcome Animation ─────────────────────────────────────────────────────────

# Base delay between each typed character in the welcome animation (milliseconds).
# Lower values make the typing appear faster.
# Server default if unset: 18
# welcome_char_ms: 18

# Random jitter added on top of welcome_char_ms per character (milliseconds).
# Adds a human feel — each character takes between welcome_char_ms and
# welcome_char_ms + welcome_jitter_ms. Set to 0 for perfectly even typing.
# Server default if unset: 12
# welcome_jitter_ms: 12

# How long the welcome animation pauses after a command finishes typing,
# before the next visual step begins (milliseconds).
# This affects each sampled welcome command.
# Lower values make the intro feel snappier; higher values make it feel more theatrical.
# Server default if unset: 650
# welcome_post_cmd_ms: 650

# How long the welcome animation waits between one sampled command block
# finishing and the next sampled command starting to type (milliseconds).
# This is the main "breathing room" between sampled command examples.
# Server default if unset: 850
# welcome_inter_block_ms: 850

# How long the very first shell prompt sits idle before the featured command
# starts typing (milliseconds).
# Increase this if you want the boot phase to land on a visible ready prompt
# with a few cursor blinks before the first example begins.
# Server default if unset: 1500
# welcome_first_prompt_idle_ms: 1500

# Extra pause after the fake startup-status block finishes and before the first
# sampled command prompt appears (milliseconds).
# This creates a clearer handoff from "boot complete" into the example phase.
# Server default if unset: 500
# welcome_post_status_pause_ms: 500

# How many sampled command examples to show after the ASCII/status intro.
# Lower values shorten the welcome sequence. Set to 0 to skip sampled commands.
# Server default if unset: 5
# welcome_sample_count: 5

# Labels shown in the fake startup-status block during the welcome animation.
# Keep this short and stylized — 4 to 6 uppercase labels reads best.
# Server default if unset:
#   - CONFIG
#   - RUNNER
#   - HISTORY
#   - LIMITS
#   - AUTOCOMPLETE
# welcome_status_labels:
#   - CONFIG
#   - RUNNER
#   - HISTORY
#   - LIMITS
#   - AUTOCOMPLETE

# How often the footer app hints rotate while the welcome tab remains idle (milliseconds).
# Higher values make the hints feel calmer; lower values make them feel more animated.
# Server default if unset: 4200
# welcome_hint_interval_ms: 4200

# Maximum number of hint states shown while the welcome tab remains idle.
# Set to 0 to keep rotating until interrupted.
# Set to 1 to keep only the first hint visible with no rotation.
# Higher values allow that many total hint states, counting the first hint.
# Server default if unset: 0
# welcome_hint_rotations: 0
