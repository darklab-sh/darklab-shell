            - -ud
            - /tmp/nuclei-templates
          position: prepend
          unless_any:
            - -ud
        - flags:
            - env
            - XDG_CONFIG_HOME={session_workspace}
          position: command_prefix
          requires_workspace: true
    autocomplete:
      examples:
        - value: nuclei -h
          description: Show help and usage
        - value: nuclei -u https://ip.darklab.sh -t http/
          description: Run HTTP detection templates
        - value: nuclei -u https://ip.darklab.sh -severity high,critical
