---
# yamllint disable rule:line-length
# Command registry.
# This file is the source of truth for external command policy, command
# catalog grouping, autocomplete hints, and smoke-test examples.
version: 1
commands:
  - root: ping
    description: Sends ICMP echo probes to check host reachability and latency.
    category: Network Diagnostics
    policy:
      allow:
        - ping
      # Deny rules take precedence when a command matches both allow and deny.
      deny:
        - ping -f
    autocomplete:
      examples:
        - value: ping -h
          description: Show help and usage
        - value: ping -c 4 darklab.sh
          description: Send 4 pings to a host
        - value: ping -i 0.5 -c 20 darklab.sh
          description: "Fast probe \u2014 20 pings at half-second intervals"
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: -c
          description: Stop after count replies
          takes_value: true
          suggest:
            - value: '4'
              description: Send four probes
            - value: '10'
              description: Send ten probes
        - value: -i
          description: Wait interval seconds between probes
          takes_value: true
          suggest:
            - value: '0.5'
              description: Half-second probe interval
        - value: -W
          description: Per-packet timeout in seconds
          takes_value: true
        - value: -w
          description: Deadline before ping exits
          takes_value: true
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
          description: Hostname or IP address to probe
  - root: fping
    description: Sends fast ICMP echo probes to one or more hosts with summary results.
    category: Network Diagnostics
    policy:
      allow:
        - fping
      deny:
        - fping -g
        - fping --generate
    autocomplete:
      examples:
        - value: fping -h
          description: Show help and usage
        - value: fping -c 4 darklab.sh
          description: Send 4 probes with a summary
        - value: fping -s darklab.sh
          description: Probe with summary stats only
        - value: fping -e darklab.sh
          description: Show elapsed time per reply
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: -c
          description: Count and summary mode
          takes_value: true
          suggest:
            - value: '4'
              description: Send four probes
        - value: -s
          description: Print summary only
        - value: -e
          description: Show elapsed time
        - value: -t
          description: Timeout per target
          takes_value: true
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
          description: Hostname or IP to probe
  - root: traceroute
    description: Maps the network path to a host by showing each hop and round-trip timing.
    category: Network Diagnostics
    policy:
      allow:
        - traceroute
      deny: []
    autocomplete:
      examples:
        - value: traceroute --help
          description: Show help and usage
        - value: traceroute -n ip.darklab.sh
          description: Trace route without hostname resolution
        - value: traceroute -m 30 ip.darklab.sh
          description: Trace route with a 30-hop maximum
      flags:
        - value: --help
          description: Show help and usage
          closes: true
        - value: -n
          description: Do not resolve hop addresses
        - value: -m
          description: Set maximum hop count
          takes_value: true
          suggest:
            - value: '30'
              description: Common maximum hop count
        - value: -w
          description: Wait timeout per probe
          takes_value: true
          suggest:
            - value: '2'
              description: Two-second per-hop timeout
        - value: -q
          description: Number of probes per hop
          takes_value: true
          suggest:
            - value: '3'
              description: Three probes per hop
        - value: -f
          description: Set the first hop TTL
          takes_value: true
          suggest:
            - value: '1'
              description: Start probing from the first hop
        - value: -I
          description: Use ICMP ECHO probes
        - value: -T
          description: Use TCP SYN probes
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
          description: Hostname or IP to trace
  - root: tcptraceroute
    description: Traces the network path to a TCP service by probing a specific destination port.
    category: Network Diagnostics
    policy:
      allow:
        - tcptraceroute
      deny: []
    autocomplete:
      examples:
        - value: tcptraceroute ip.darklab.sh 80
          description: Trace route to ip.darklab.sh on port 80
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: -n
          description: Do not resolve hop addresses
        - value: -m
          description: Set maximum hop count
          takes_value: true
          suggest:
            - value: '30'
              description: Common maximum hop count
        - value: -w
          description: Wait timeout per probe
          takes_value: true
          suggest:
            - value: '2'
              description: Two-second per-hop timeout
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
          description: Hostname or IP to trace
        - placeholder: <port>
          hint_only: true
          description: TCP port to probe
  - root: nc
    description: Tests TCP port reachability and basic socket connectivity.
    category: Network Diagnostics
    policy:
      allow:
        - nc -z
        - nc -h
      deny:
        - nc -e
        - nc -c
    autocomplete:
      examples:
        - value: nc -h
          description: Show help and usage
        - value: nc -zv ip.darklab.sh 80
          description: Check if port 80 is open
        - value: nc -zv ip.darklab.sh 443 80
          description: Check multiple ports at once
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: -z
          description: Zero-I/O mode for port scanning
          allow_grouping: true
        - value: -v
          description: Verbose connection results
          allow_grouping: true
        - value: -n
          description: Skip DNS lookups
          allow_grouping: true
        - value: -w
          description: Timeout before giving up
          takes_value: true
          suggest:
            - value: '3'
              description: Short timeout in seconds
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
          description: Hostname or IP followed by one or more ports
  - root: mtr
    description: Combines traceroute and ping to show live hop-by-hop reachability and loss.
    category: Network Diagnostics
    policy:
      allow:
        - mtr
      deny: []
    runtime_adaptations:
      inject_flags:
        - flags:
            - --report-wide
          position: prepend
          unless_any:
            - --report
            - --report-wide
            - -r
          notice: "Note: mtr has been run in --report-wide mode (non-interactive). See FAQ for details."
    autocomplete:
      examples:
        - value: mtr -h
          description: Show help and usage
        - value: mtr -n ip.darklab.sh
          description: Trace without hostname resolution
        - value: mtr -c 20 ip.darklab.sh
          description: Stop after 20 probes
        - value: mtr -n -c 20 ip.darklab.sh
          description: 20 probes, no DNS resolution
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: -n
          description: Do not resolve hostnames
        - value: -c
          description: Stop after count pings
          takes_value: true
          suggest:
            - value: '20'
              description: Twenty probes before exit
        - value: -r
          description: Report mode summary
        - value: -w
          description: Wide report output
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
          description: Hostname or IP to trace
  - root: dig
    description: Queries DNS records and resolver behavior with detailed response output.
    category: Network Diagnostics
    policy:
      allow:
        - dig
      deny: []
    autocomplete:
      examples:
        - value: dig -h
          description: Show help and usage
        - value: dig darklab.sh +short
          description: A record lookup, short output
        - value: dig MX darklab.sh +short
          description: Mail exchanger records
        - value: dig @8.8.8.8 darklab.sh
          description: Query using Google's public resolver
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: +short
          description: Short answer output
        - value: +trace
          description: Trace delegation path
        - value: '@8.8.8.8'
          description: Query a specific resolver
        - value: AXFR
          description: Attempt zone transfer
        - value: AAAA
          description: IPv6 address lookup
        - value: MX
          description: Mail exchanger lookup
      arguments:
        - placeholder: <domain>
          hint_only: true
          value_type: domain
          description: Domain name to query
  - root: nslookup
    description: Performs straightforward DNS lookups for hostnames, domains, and record types.
    category: Network Diagnostics
    policy:
      allow:
        - nslookup
      deny: []
    autocomplete:
      examples:
        - value: nslookup -type=A darklab.sh
          description: IPv4 address lookup
        - value: nslookup -type=MX darklab.sh
          description: Mail exchanger lookup
        - value: nslookup -type=TXT darklab.sh
          description: TXT record lookup
      flags:
        - value: -type=A
          description: IPv4 address lookup
        - value: -type=AAAA
          description: IPv6 address lookup
        - value: -type=MX
          description: Mail exchanger lookup
        - value: -type=TXT
          description: TXT record lookup
        - value: -type=NS
          description: Name server lookup
        - value: -type=CNAME
          description: Canonical name lookup
        - value: -debug
          description: Print extra resolver details
      arguments:
        - placeholder: <domain>
          hint_only: true
          value_type: domain
          description: Domain name to query
  - root: host
    description: Performs simple DNS lookups for names, addresses, and common record types.
    category: Network Diagnostics
    policy:
      allow:
        - host
      deny: []
    autocomplete:
      examples:
        - value: host -t A darklab.sh
          description: IPv4 address lookup
        - value: host -t MX darklab.sh
          description: Mail exchanger lookup
        - value: host -t NS darklab.sh
          description: Name server lookup
      flags:
        - value: -t
          description: Select DNS record type
          takes_value: true
          suggest:
            - value: A
              description: IPv4 address lookup
            - value: AAAA
              description: IPv6 address lookup
            - value: MX
              description: Mail exchanger lookup
            - value: TXT
              description: TXT record lookup
            - value: NS
              description: Name server lookup
      arguments:
        - placeholder: <domain>
          hint_only: true
          value_type: domain
          description: Domain name to query
  - root: whois
    description: Retrieves domain, IP, and network registration records from WHOIS services.
    category: Network Diagnostics
    policy:
      allow:
        - whois
      deny: []
    autocomplete:
      examples:
        - value: whois --help
          description: Show help and usage
        - value: whois darklab.sh
          description: Domain registration lookup
        - value: whois 104.21.4.35
          description: IP allocation lookup
        - value: whois -h whois.iana.org darklab.sh
          description: Query a specific WHOIS server
      flags:
        - value: --help
          description: Show help and usage
          closes: true
        - value: -h
          description: WHOIS server to query
          takes_value: true
          suggest:
            - value: whois.iana.org
              description: IANA WHOIS server
            - value: whois.verisign-grs.com
              description: Verisign .com/.net WHOIS server
            - value: whois.arin.net
              description: ARIN WHOIS server for IP allocations
        - value: -p
          description: WHOIS server port
          takes_value: true
          suggest:
            - value: '43'
              description: Standard WHOIS port
        - value: -H
          description: Hide legal disclaimers when supported
      arguments:
        - placeholder: <domain-or-ip>
          hint_only: true
          value_type: domain
          description: Domain name, IP address, or ASN to query
  - root: curl
    description: Sends HTTP(S) requests and displays or saves the response.
    category: Network Diagnostics
    policy:
      allow:
        - curl
      deny:
        - curl -o
        - curl --output
        - curl -O
        - curl --remote-name
        - curl --upload-file
        - curl -T
        - curl -K
        - curl --config
        - curl localhost
        - curl 127.0.0.1
        - curl 0.0.0.0
    workspace_flags:
      - flag: -o
        mode: write
        value: separate
        format: text
      - flag: --output
        mode: write
        value: separate_or_attached
        format: text
    autocomplete:
      examples:
        - value: curl -h
          description: Show help and usage
        - value: curl -I https://ip.darklab.sh
          description: "HEAD request \u2014 show response headers only"
        - value: curl -sv https://ip.darklab.sh
          description: "Verbose \u2014 full request and response headers"
        - value: curl -o /dev/null -w "%{http_code}" https://ip.darklab.sh
          description: Print just the HTTP status code
        - value: curl -L -o response.html https://noc.darklab.sh
          description: Save the response body to a session file
          feature_required: workspace
      flags:
        - value: -h
          description: Show help and usage
          takes_value: true
          closes: true
        - value: -I
          description: HEAD request only
        - value: -s
          description: Silent mode
        - value: -v
          description: Verbose request and response details
        - value: -o
          description: Write body to file
          takes_value: true
          suggest:
            - value: /dev/null
              description: Discard body and keep metadata
            - value: response.html
              description: Save response body as a session file
              feature_required: workspace
        - value: -w
          description: Write selected metadata after the transfer
          takes_value: true
          suggest:
            - value: '"%{http_code}"'
              description: Print the final HTTP status code
            - value: '"%{remote_ip} %{http_code}"'
              description: Print remote IP and status code
        - value: -H
          description: Add request header
          takes_value: true
          suggest:
            - value: '"User-Agent: Mozilla/5.0"'
              description: Example browser-style user agent
            - value: '"Authorization: Bearer <token>"'
              description: Example bearer token header
        - value: -L
          description: Follow redirects
        - value: -k
          description: Skip TLS verification
        - value: --max-time
          description: Maximum transfer time in seconds
          takes_value: true
          suggest:
            - value: '10'
              description: Ten-second transfer limit
      arguments:
        - placeholder: <url>
          hint_only: true
          value_type: url
          description: Target URL to request
  - root: wget
    description: Downloads HTTP(S) resources and can save responses into session files.
    category: Network Diagnostics
    policy:
      allow:
        - wget
      deny:
        - wget -O
        - wget --output-document
        - wget --input-file
        - wget -i
        - wget localhost
        - wget 127.0.0.1
        - wget 0.0.0.0
    workspace_flags:
      - flag: -O
        mode: write
        value: separate
        format: text
      - flag: --output-document
        mode: write
        value: separate_or_attached
        format: text
      - flag: -i
        mode: read
        value: separate
        format: text
      - flag: --input-file
        mode: read
        value: separate_or_attached
        format: text
    autocomplete:
      examples:
        - value: wget -h
          description: Show help and usage
        - value: wget --spider https://ip.darklab.sh
          description: Check URL without downloading
        - value: wget -q -O /dev/null --server-response https://ip.darklab.sh
          description: Show server response headers, discard body
        - value: wget -q -O response.html https://noc.darklab.sh
          description: Save a response body to a session file
          feature_required: workspace
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: --spider
          description: Check URL without downloading
        - value: -q
          description: Quiet output
        - value: -O
          description: Write output to a specific file
          takes_value: true
          suggest:
            - value: /dev/null
              description: Discard response body
            - value: response.html
              description: Save response body as a session file
              feature_required: workspace
        - value: --output-document
          description: Write output to a session file
          takes_value: true
          feature_required: workspace
          suggest:
            - value: response.html
              description: Save response body for later viewing
        - value: -i
          description: Read URLs from a session file
          takes_value: true
          feature_required: workspace
          value_hint:
            placeholder: <url-file>
            hint_only: true
            value_type: url
            description: Session file containing one URL per line
          suggest:
            - value: urls.txt
              description: Session file containing one URL per line
        - value: --input-file
          description: Read URLs from a session file
          takes_value: true
          feature_required: workspace
          value_hint:
            placeholder: <url-file>
            hint_only: true
            value_type: url
            description: Session file containing one URL per line
          suggest:
            - value: urls.txt
              description: Session file containing one URL per line
        - value: --server-response
          description: Print server response headers
        - value: --timeout
          description: Network timeout in seconds
          takes_value: true
          suggest:
            - value: '10'
              description: Ten-second network timeout
        - value: --tries
          description: Number of retry attempts
          takes_value: true
          suggest:
            - value: '1'
              description: Single attempt only
        - value: --no-check-certificate
          description: Skip TLS certificate validation
      arguments:
        - placeholder: <url>
          hint_only: true
          value_type: url
          description: Target URL to download or probe
  - root: openssl
    description: Inspects TLS connections, certificates, and cryptographic details through OpenSSL subcommands.
    category: TLS / Certificates
    policy:
      allow:
        - openssl s_client
        - openssl ciphers
      deny:
        - openssl s_client -cert
        - openssl s_client -key
        - openssl s_client -CAfile
        - openssl s_client -CApath
    workspace_flags:
      - flag: -CAfile
        mode: read
        value: separate
        format: text
    autocomplete:
      examples:
        - value: openssl s_client -help
          description: Show s_client help and usage
        - value: openssl ciphers -help
          description: Show ciphers help and usage
      flags:
        - value: -help
          description: Show top-level help and usage
          closes: true
      subcommands:
        s_client:
          description: Connect to a TLS service for diagnostics
          examples:
            - value: openssl s_client -connect ip.darklab.sh:443 -quiet
              description: Inspect TLS connection and certificate
            - value: openssl s_client -connect ip.darklab.sh:443 -showcerts
              description: Show full certificate chain
            - value: openssl s_client -connect ip.darklab.sh:443 -servername ip.darklab.sh -CAfile ca.pem
              description: Validate with a CA bundle from session files
              feature_required: workspace
          flags:
            - value: -help
              description: Show s_client help and usage
              closes: true
            - value: -connect
              description: Host and port to connect to (host:port)
              takes_value: true
              suggest:
                - value: <host>:443
                  description: HTTPS port
                - value: <host>:465
                  description: SMTPS port
                - value: <host>:993
                  description: IMAPS port
            - value: -servername
              description: SNI hostname
              takes_value: true
              value_hint:
                placeholder: <hostname>
                hint_only: true
                value_type: domain
                description: SNI hostname matching the certificate
            - value: -showcerts
              description: Display the full certificate chain
            - value: -starttls
              description: Use STARTTLS for a plaintext protocol
              takes_value: true
              suggest:
                - value: smtp
                  description: STARTTLS for SMTP
                - value: ftp
                  description: STARTTLS for FTP
                - value: imap
                  description: STARTTLS for IMAP
                - value: pop3
                  description: STARTTLS for POP3
            - value: -verify
              description: Set certificate verification depth
              takes_value: true
            - value: -brief
              description: Print a brief connection summary
            - value: -tls1_2
              description: Force TLS 1.2
            - value: -tls1_3
              description: Force TLS 1.3
            - value: -quiet
              description: Suppress session and certificate details
            - value: -CAfile
              description: Read a CA bundle from a session file
              takes_value: true
              feature_required: workspace
              suggest:
                - value: ca.pem
                  description: Session file containing trusted CA certificates
        ciphers:
          description: Display and filter OpenSSL cipher suites
          examples:
            - value: openssl ciphers -v
              description: List all supported cipher suites verbosely
            - value: openssl ciphers -s -v 'ALL:@SECLEVEL=2'
              description: Show supported ciphers at security level 2
          flags:
            - value: -help
              description: Show ciphers help and usage
              closes: true
            - value: -v
              description: Verbose cipher listing
            - value: -V
              description: Include official cipher suite values in hex
            - value: -stdname
              description: Include standard cipher suite names
            - value: -s
              description: Only list ciphers supported by configured protocol/security settings
            - value: -tls1_2
              description: Limit supported-cipher filtering to TLS 1.2
            - value: -tls1_3
              description: Limit supported-cipher filtering to TLS 1.3
            - value: -ciphersuites
              description: Configure TLS 1.3 ciphersuites
              takes_value: true
              value_hint:
                description: Colon-separated TLS 1.3 ciphersuite names
  - root: sslscan
    description: Scans TLS services for supported protocols, cipher suites, and certificate details.
    category: TLS / Certificates
    policy:
      allow:
        - sslscan
      deny:
        - sslscan --xml
    workspace_flags:
      - flag: --xml
        mode: write
        value: separate_or_attached
        format: xml
    autocomplete:
      examples:
        - value: sslscan -h
          description: Show help and usage
        - value: sslscan ip.darklab.sh
          description: Full TLS scan of a host
        - value: sslscan --no-failed ip.darklab.sh
          description: Scan but suppress failed cipher output
        - value: sslscan --xml=sslscan.xml ip.darklab.sh
          description: Save TLS scan XML to a session file
          feature_required: workspace
      flags:
        - value: -h
          description: Show help and usage
          closes: true
        - value: --tls12
          description: Only test TLS 1.2
        - value: --tls13
          description: Only test TLS 1.3
        - value: --no-failed
          description: Suppress failed cipher output
        - value: --show-certificate
          description: Display the full certificate chain
        - value: --xml
          description: Write XML results to a session file
          takes_value: true
          feature_required: workspace
          suggest:
            - value: sslscan.xml
              description: Save XML scan results
        - value: --bugs
          description: Enable SSL implementation bug workarounds
        - value: --timeout
          description: Socket timeout in seconds
          takes_value: true
          suggest:
            - value: '10'
              description: Ten-second socket timeout
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
          description: Hostname or host:port to scan
  - root: sslyze
    description: Analyzes TLS server configuration and common SSL/TLS weaknesses.
    category: TLS / Certificates
    policy:
      allow:
        - sslyze
      deny:
        - sslyze --json_out
        - sslyze --targets_in
    workspace_flags:
      - flag: --targets_in
        mode: read
        value: separate_or_attached
        format: text
      - flag: --json_out
        mode: write
        value: separate_or_attached
        format: json
    autocomplete:
      examples:
        - value: sslyze --help
          description: Show help and usage
        - value: sslyze --certinfo ip.darklab.sh
          description: Validate the certificate chain
        - value: sslyze --heartbleed ip.darklab.sh
          description: Test for the Heartbleed vulnerability
        - value: sslyze --targets_in tls-targets.txt --json_out sslyze-results.json
          description: Scan hosts from a session file and save JSON results
          feature_required: workspace
      flags:
        - value: --help
          description: Show help and usage
          closes: true
        - value: --certinfo
          description: Retrieve and validate the certificate chain
        - value: --heartbleed
          description: Test for the Heartbleed vulnerability
        - value: --robot
          description: Test for the ROBOT vulnerability
        - value: --http_headers
          description: Test for security HTTP headers
        - value: --early_data
          description: Test for TLS 1.3 0-RTT early data support
        - value: --compression
          description: Test for TLS compression (CRIME)
        - value: --reneg
          description: Test for insecure TLS renegotiation
        - value: --tlsv1_2
          description: Run TLS 1.2 cipher suite scan
        - value: --tlsv1_3
          description: Run TLS 1.3 cipher suite scan
        - value: --targets_in
          description: Read TLS targets from a session file
          takes_value: true
          feature_required: workspace
          value_hint:
            placeholder: <target-file>
            hint_only: true
            value_type: target
            description: Session file containing one TLS target per line
          suggest:
            - value: tls-targets.txt
              description: Session file containing host or host:port entries
        - value: --json_out
          description: Write JSON results to a session file
          takes_value: true
          feature_required: workspace
          suggest:
            - value: sslyze-results.json
              description: Save JSON scan results
      arguments:
        - placeholder: <host>
          hint_only: true
          value_type: domain
