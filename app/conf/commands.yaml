pipe_helpers:
  - root: grep
    autocomplete:
      pipe:
        enabled: true
        description: Filter lines by pattern
      flags:
        - value: -i
          description: Ignore case
        - value: -v
          description: Invert match
        - value: -E
          description: Extended regex
      arguments:
        - placeholder: <pattern>
          hint_only: true
          description: Text or regex to match
  - root: head
    autocomplete:
      pipe:
        enabled: true
        description: Show the first lines
      flags:
        - value: -n
          description: Show the first N lines
          takes_value: true
          suggest:
            - value: '5'
              description: Show the first 5 lines
            - value: '10'
              description: Show the first 10 lines
            - value: '20'
              description: Show the first 20 lines
            - value: '50'
              description: Show the first 50 lines
  - root: tail
    autocomplete:
      pipe:
        enabled: true
        description: Show the last lines
      flags:
        - value: -n
          description: Show the last N lines
          takes_value: true
          suggest:
            - value: '5'
              description: Show the last 5 lines
            - value: '10'
              description: Show the last 10 lines
            - value: '20'
              description: Show the last 20 lines
            - value: '50'
              description: Show the last 50 lines
  - root: wc
    autocomplete:
      pipe:
        enabled: true
        description: Count lines
        insert: wc -l
        label: wc -l
      flags:
        - value: -l
          description: Count lines
  - root: sort
    autocomplete:
      pipe:
        enabled: true
        description: Sort lines
      flags:
        - value: -r
          description: Reverse order
        - value: -n
          description: Numeric sort
        - value: -u
          description: Remove duplicate lines
        - value: -rn
          description: Reverse numeric sort
        - value: -ru
          description: Reverse and deduplicate
        - value: -nu
          description: Numeric sort and deduplicate
        - value: -rnu
          description: Reverse numeric sort and deduplicate
  - root: uniq
    autocomplete:
      pipe:
        enabled: true
        description: Remove duplicate lines
      flags:
        - value: -c
          description: Prefix each line with its occurrence count
