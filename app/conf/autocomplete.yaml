# Unified autocomplete configuration.
#
# Top-level shape:
# context:
#   <command-root>:
#     flags:
#       - value: <flag-or-token>
#         description: <short help text>
#     expects_value:
#       - <flag-that-consumes-the-next-token>
#     arg_hints:
#       "<flag>":
#         - value: <suggested-value>
#           description: <short help text>
#       "__positional__":
#         - value: <positional-placeholder-or-example>
#           description: <short help text>
#
# - flags:
#   suggestions shown when the current token looks like a flag position,
#   e.g. `nmap -` or `ffuf -`.
#
# - expects_value:
#   flags whose next token is a value slot rather than another flag slot.
#   Example: `curl -H <cursor>` uses arg_hints["-H"] instead of more flags.
#
# - arg_hints:
#   value hints shown after a specific flag, or generic positional hints via
#   the special key "__positional__".
#
# Authoring rules:
# - Every known command root should have an entry, even if minimal (`command: {}`),
#   so it is discoverable via prefix matching.
# - Add flags for commands where flag suggestions add value.
# - Use expects_value when the next token should be a value, not another flag.
# - Use arg_hints["__positional__"] for normal positional arguments (targets,
#   hosts, URLs, domains, CIDR ranges). Omit it for commands that take no args.
# - For arg_hints values, prefer concrete examples for prefix matching
#   (`https://`, `/dev/null`) and placeholders for explanatory guidance
#   (`<target>`, `<domain>`).
# - Positional hints are shown alongside flags at `command ` so the required
#   argument stays discoverable before typing begins.
# - `pipe_command: true` marks entries that are also suggested after `command |`.
# - `pipe_insert_value` overrides the inserted text (e.g. `wc -l`).
# - `examples` is a list of full command invocations shown while the user is
#   still typing the command root (before any trailing space). Accepting one
#   replaces the entire input with the example. Use these to surface common
#   invocation patterns for users who are unfamiliar with a command.
#   Shape: `- value: <full-command>` / `description: <what it does>`
#
# The container smoke test runs every example command defined here. Add or
# remove examples to add or remove commands from the regression suite.

context:
  grep:
    pipe_command: true
    pipe_description: Filter lines by pattern
    flags:
      - value: -i
        description: Ignore case
      - value: -v
        description: Invert match
      - value: -E
        description: Extended regex
    arg_hints:
      "__positional__":
        - value: "<pattern>"
          description: Text or regex to match

  head:
    pipe_command: true
    pipe_description: Show the first lines
    flags:
      - value: -n
        description: Show the first N lines
    expects_value:
      - -n
    arg_hints:
      "-n":
        - value: "5"
          description: Show the first 5 lines
        - value: "10"
          description: Show the first 10 lines
        - value: "20"
          description: Show the first 20 lines
        - value: "50"
          description: Show the first 50 lines

  tail:
    pipe_command: true
    pipe_description: Show the last lines
    flags:
      - value: -n
        description: Show the last N lines
    expects_value:
      - -n
    arg_hints:
      "-n":
        - value: "5"
          description: Show the last 5 lines
        - value: "10"
          description: Show the last 10 lines
        - value: "20"
          description: Show the last 20 lines
        - value: "50"
          description: Show the last 50 lines

  wc:
    pipe_command: true
    pipe_insert_value: "wc -l"
    pipe_label: "wc -l"
    pipe_description: Count lines
    flags:
      - value: -l
        description: Count lines

  sort:
    pipe_command: true
    pipe_description: Sort lines
    flags:
      - value: -r
        description: Reverse order
      - value: -n
        description: Numeric sort
      - value: -u
        description: Remove duplicate lines
      - value: -rn
        description: Reverse numeric sort
      - value: -ru
        description: Reverse and deduplicate
      - value: -nu
        description: Numeric sort and deduplicate
      - value: -rnu
        description: Reverse numeric sort and deduplicate

  uniq:
    pipe_command: true
    pipe_description: Remove duplicate lines
    flags:
      - value: -c
        description: Prefix each line with its occurrence count

  nmap:
    examples:
      - value: "nmap -h"
        description: Show help and usage
      - value: "nmap -sV -p 80,443 ip.darklab.sh"
        description: Service version detection on web ports
      - value: "nmap -A -T4 ip.darklab.sh"
        description: Aggressive scan with OS and service detection
      - value: "nmap -Pn --top-ports 100 ip.darklab.sh"
        description: Top 100 ports, skip host discovery
    flags:
      - value: -h
        description: Show help and usage
      - value: -sT
        description: TCP connect scan
      - value: -sV
        description: Service/version detection
      - value: -Pn
        description: Skip host discovery
      - value: -p
        description: Ports to scan
      - value: --script
        description: Run NSE script or script category
      - value: --top-ports
        description: Scan common ports
      - value: -T4
        description: Faster timing template
      - value: -A
        description: Aggressive detection bundle
      - value: -n
        description: Do not resolve DNS names
      - value: -vv
        description: More verbose output
    expects_value:
      - -p
      - --script
      - --top-ports
    arg_hints:
      "-p":
        - value: "80,443"
          description: Common web ports
        - value: "1-1000"
          description: First thousand TCP ports
        - value: "<ports>"
          description: Comma-separated ports or ranges
      "--script":
        - value: "http-headers"
          description: Fetch HTTP response headers
        - value: "http-title"
          description: Fetch HTTP page title
        - value: "ssl-cert"
          description: Inspect the TLS certificate
        - value: "ssl-enum-ciphers"
          description: Enumerate supported TLS ciphers
        - value: "vuln"
          description: Run vulnerability-focused scripts
      "--top-ports":
        - value: "100"
          description: Top hundred ports
        - value: "1000"
          description: Top thousand ports
        - value: "<number>"
          description: Number of top ports to scan
      "__positional__":
        - value: "<target>"
          description: Hostname, IP, or CIDR

  ffuf:
    examples:
      - value: "ffuf -h"
        description: Show help and usage
      - value: "ffuf -u https://ip.darklab.sh/FUZZ -w /usr/share/wordlists/seclists/Discovery/Web-Content/common.txt"
        description: Directory brute force with common wordlist
      - value: "ffuf -u https://ip.darklab.sh/FUZZ -w /usr/share/wordlists/seclists/Discovery/Web-Content/common.txt -mc 200,301,302"
        description: Filter for successful and redirect responses
      - value: "ffuf -u https://FUZZ.ip.darklab.sh -w /usr/share/wordlists/seclists/Discovery/DNS/subdomains-top1million-5000.txt -H \"Host: FUZZ.ip.darklab.sh\""
        description: Virtual host brute force with Host header injection
    flags:
      - value: -h
        description: Show help and usage
      - value: -u
        description: Target URL with FUZZ marker
      - value: -w
        description: Wordlist path
      - value: -mc
        description: Match status codes
      - value: -fc
        description: Filter status codes
      - value: -H
        description: Add request header
      - value: -t
        description: Concurrent threads
    expects_value:
      - -u
      - -w
      - -mc
      - -fc
      - -H
      - -t
    arg_hints:
      "-u":
        - value: "<url-with-FUZZ>"
          description: Target URL including FUZZ
      "-w":
        - value: "/usr/share/wordlists/seclists/Discovery/Web-Content/common.txt"
          description: Common web-content wordlist
      "__positional__":
        - value: "<target-url>"
          description: Usually provided through -u

  openssl:
    examples:
      - value: "openssl s_client -connect ip.darklab.sh:443 -quiet"
        description: Inspect TLS connection and certificate
      - value: "openssl s_client -connect ip.darklab.sh:443 -showcerts"
        description: Show full certificate chain
    subcommands:
      - value: s_client
        description: Connect and inspect a TLS endpoint
      - value: ciphers
        description: List available cipher suites
    flags:
      - value: -connect
        description: Host and port to connect to (host:port)
      - value: -servername
        description: SNI hostname (required for virtual-hosted TLS)
      - value: -showcerts
        description: Display the full certificate chain
      - value: -starttls
        description: Use STARTTLS for the specified protocol (smtp, ftp, imap, pop3)
      - value: -verify
        description: Set certificate verification depth
      - value: -tls1_2
        description: Force TLS 1.2
      - value: -tls1_3
        description: Force TLS 1.3
      - value: -quiet
        description: Suppress session and certificate details
    expects_value:
      - -connect
      - -servername
      - -starttls
      - -verify
    arg_hints:
      "-connect":
        - value: "<host>:443"
          description: HTTPS port
        - value: "<host>:465"
          description: SMTPS port
        - value: "<host>:993"
          description: IMAPS port
      "-servername":
        - value: "<hostname>"
          description: SNI hostname matching the certificate
      "-starttls":
        - value: smtp
          description: STARTTLS for SMTP (port 25 or 587)
        - value: ftp
          description: STARTTLS for FTP
        - value: imap
          description: STARTTLS for IMAP
        - value: pop3
          description: STARTTLS for POP3
      "__positional__":
        - value: "s_client -connect <host>:443"
          description: Inspect TLS certificate and connection
        - value: "ciphers -v"
          description: List all supported cipher suites verbosely

  curl:
    examples:
      - value: "curl -h"
        description: Show help and usage
      - value: "curl -I https://ip.darklab.sh"
        description: HEAD request — show response headers only
      - value: "curl -sv https://ip.darklab.sh"
        description: Verbose — full request and response headers
      - value: "curl -o /dev/null -w \"%{http_code}\" https://ip.darklab.sh"
        description: Print just the HTTP status code
    flags:
      - value: -h
        description: Show help and usage
      - value: -I
        description: HEAD request only
      - value: -s
        description: Silent mode
      - value: -v
        description: Verbose request and response details
      - value: -o
        description: Write body to file
      - value: -w
        description: Write selected metadata after the transfer
      - value: -H
        description: Add request header
      - value: -L
        description: Follow redirects
      - value: -k
        description: Skip TLS verification
      - value: --max-time
        description: Maximum transfer time in seconds
    expects_value:
      - -o
      - -w
      - -H
      - --max-time
    arg_hints:
      "-o":
        - value: "/dev/null"
          description: Discard body and keep metadata
      "-w":
        - value: "\"%{http_code}\""
          description: Print the final HTTP status code
        - value: "\"%{remote_ip} %{http_code}\""
          description: Print remote IP and status code
      "-H":
        - value: "\"User-Agent: Mozilla/5.0\""
          description: Example browser-style user agent
        - value: "\"Authorization: Bearer <token>\""
          description: Example bearer token header
      "--max-time":
        - value: "10"
          description: Ten-second transfer limit
      "__positional__":
        - value: "https://"
          description: Start an HTTP or HTTPS URL

  dig:
    examples:
      - value: "dig -h"
        description: Show help and usage
      - value: "dig darklab.sh +short"
        description: A record lookup, short output
      - value: "dig MX darklab.sh +short"
        description: Mail exchanger records
      - value: "dig @8.8.8.8 darklab.sh"
        description: Query using Google's public resolver
    flags:
      - value: -h
        description: Show help and usage
      - value: +short
        description: Short answer output
      - value: +trace
        description: Trace delegation path
      - value: "@8.8.8.8"
        description: Query a specific resolver
      - value: AXFR
        description: Attempt zone transfer
      - value: AAAA
        description: IPv6 address lookup
      - value: MX
        description: Mail exchanger lookup
    arg_hints:
      "__positional__":
        - value: "<domain>"
          description: Domain name to query

  nuclei:
    examples:
      - value: "nuclei -h"
        description: Show help and usage
      - value: "nuclei -u https://ip.darklab.sh -t http/"
        description: Run HTTP detection templates
      - value: "nuclei -u https://ip.darklab.sh -severity high,critical"
        description: Run only high and critical severity templates
      - value: "nuclei -u https://ip.darklab.sh -t ssl/"
        description: Run TLS/SSL detection templates
    flags:
      - value: -h
        description: Show help and usage
      - value: -u
        description: Single target URL
      - value: -l
        description: File with targets
      - value: -t
        description: Template or template directory
      - value: -severity
        description: Filter by severity
      - value: -tags
        description: Filter by tags
      - value: -rl
        description: Rate limit requests
    expects_value:
      - -u
      - -l
      - -t
      - -severity
      - -tags
      - -rl
    arg_hints:
      "-severity":
        - value: "low,medium,high,critical"
          description: Comma-separated severities
      "__positional__":
        - value: "<target>"
          description: Usually provided through -u or -l

  ping:
    examples:
      - value: "ping -h"
        description: Show help and usage
      - value: "ping -c 4 darklab.sh"
        description: Send 4 pings to a host
      - value: "ping -i 0.5 -c 20 darklab.sh"
        description: Fast probe — 20 pings at half-second intervals
    flags:
      - value: -h
        description: Show help and usage
      - value: -c
        description: Stop after count replies
      - value: -i
        description: Wait interval seconds between probes
      - value: -W
        description: Per-packet timeout in seconds
      - value: -w
        description: Deadline before ping exits
    expects_value:
      - -c
      - -i
      - -W
      - -w
    arg_hints:
      "-c":
        - value: "4"
          description: Send four probes
        - value: "10"
          description: Send ten probes
      "-i":
        - value: "0.5"
          description: Half-second probe interval
      "__positional__":
        - value: "<host>"
          description: Hostname or IP address to probe

  nc:
    examples:
      - value: "nc -zv ip.darklab.sh 80"
        description: Check if port 80 is open
      - value: "nc -zv ip.darklab.sh 443 80"
        description: Check multiple ports at once
    flags:
      - value: -z
        description: Zero-I/O mode for port scanning
      - value: -v
        description: Verbose connection results
      - value: -w
        description: Timeout before giving up
    expects_value:
      - -w
    arg_hints:
      "-w":
        - value: "3"
          description: Short timeout in seconds
      "__positional__":
        - value: "<host>"
          description: Hostname or IP followed by one or more ports

  nslookup:
    examples:
      - value: "nslookup -type=A darklab.sh"
        description: IPv4 address lookup
      - value: "nslookup -type=MX darklab.sh"
        description: Mail exchanger lookup
      - value: "nslookup -type=TXT darklab.sh"
        description: TXT record lookup
    flags:
      - value: -type=A
        description: IPv4 address lookup
      - value: -type=AAAA
        description: IPv6 address lookup
      - value: -type=MX
        description: Mail exchanger lookup
      - value: -type=TXT
        description: TXT record lookup
      - value: -type=NS
        description: Name server lookup
      - value: -type=CNAME
        description: Canonical name lookup
      - value: -debug
        description: Print extra resolver details
    arg_hints:
      "__positional__":
        - value: "<domain>"
          description: Domain name to query

  host:
    examples:
      - value: "host -t A darklab.sh"
        description: IPv4 address lookup
      - value: "host -t MX darklab.sh"
        description: Mail exchanger lookup
      - value: "host -t NS darklab.sh"
        description: Name server lookup
    flags:
      - value: -t
        description: Select DNS record type
    expects_value:
      - -t
    arg_hints:
      "-t":
        - value: "A"
          description: IPv4 address lookup
        - value: "AAAA"
          description: IPv6 address lookup
        - value: "MX"
          description: Mail exchanger lookup
        - value: "TXT"
          description: TXT record lookup
        - value: "NS"
          description: Name server lookup
      "__positional__":
        - value: "<domain>"
          description: Domain name to query

  traceroute:
    examples:
      - value: "traceroute --help"
        description: Show help and usage
      - value: "traceroute -n ip.darklab.sh"
        description: Trace route without hostname resolution
      - value: "traceroute -m 30 ip.darklab.sh"
        description: Trace with a 30-hop maximum
    flags:
      - value: --help
        description: Show help and usage
      - value: -n
        description: Do not resolve hop addresses
      - value: -m
        description: Set maximum hop count
      - value: -w
        description: Wait timeout per probe
      - value: -q
        description: Number of probes per hop
      - value: -f
        description: Set the first hop TTL
      - value: -I
        description: Use ICMP ECHO probes
      - value: -T
        description: Use TCP SYN probes
    expects_value:
      - -f
      - -m
      - -w
      - -q
    arg_hints:
      "-f":
        - value: "1"
          description: Start probing from the first hop
      "-m":
        - value: "30"
          description: Common maximum hop count
      "-w":
        - value: "2"
          description: Two-second per-hop timeout
      "-q":
        - value: "3"
          description: Three probes per hop
      "__positional__":
        - value: "<host>"
          description: Hostname or IP to trace

  mtr:
    examples:
      - value: "mtr -h"
        description: Show help and usage
      - value: "mtr -n ip.darklab.sh"
        description: Trace without hostname resolution
      - value: "mtr -c 20 ip.darklab.sh"
        description: Stop after 20 probes
      - value: "mtr -n -c 20 ip.darklab.sh"
        description: 20 probes, no DNS resolution
    flags:
      - value: -h
        description: Show help and usage
      - value: -n
        description: Do not resolve hostnames
      - value: -c
        description: Stop after count pings
      - value: -r
        description: Report mode summary
      - value: -w
        description: Wide report output
    expects_value:
      - -c
    arg_hints:
      "-c":
        - value: "20"
          description: Twenty probes before exit
      "__positional__":
        - value: "<host>"
          description: Hostname or IP to trace

  wget:
    examples:
      - value: "wget -h"
        description: Show help and usage
      - value: "wget --spider https://ip.darklab.sh"
        description: Check URL without downloading
      - value: "wget -q -O /dev/null --server-response https://ip.darklab.sh"
        description: Show server response headers, discard body
    flags:
      - value: -h
        description: Show help and usage
      - value: --spider
        description: Check URL without downloading
      - value: -q
        description: Quiet output
      - value: -O
        description: Write output to a specific file
      - value: --server-response
        description: Print server response headers
      - value: --timeout
        description: Network timeout in seconds
      - value: --tries
        description: Number of retry attempts
      - value: --no-check-certificate
        description: Skip TLS certificate validation
    expects_value:
      - -O
      - --timeout
      - --tries
    arg_hints:
      "-O":
        - value: "/dev/null"
          description: Discard response body
      "--timeout":
        - value: "10"
          description: Ten-second network timeout
      "--tries":
        - value: "1"
          description: Single attempt only
      "__positional__":
        - value: "https://"
          description: Start an HTTP or HTTPS URL

  testssl:
    examples:
      - value: "testssl --help"
        description: Show help and usage
      - value: "testssl --fast https://ip.darklab.sh"
        description: Quick, lightweight TLS scan
      - value: "testssl --severity HIGH https://ip.darklab.sh"
        description: Report only high-severity findings
      - value: "testssl --heartbleed https://ip.darklab.sh"
        description: Check for the Heartbleed vulnerability
    flags:
      - value: --help
        description: Show help and usage
      - value: --fast
        description: Faster, lighter scan profile
      - value: --severity
        description: Restrict findings by severity
      - value: --full
        description: Full test suite
      - value: --sneaky
        description: Slower, quieter checks
      - value: -p
        description: Protocol checks only
      - value: --heartbleed
        description: Check for Heartbleed
      - value: --poodle
        description: Check for POODLE
      - value: --beast
        description: Check for BEAST
    expects_value:
      - --severity
    arg_hints:
      "--severity":
        - value: "HIGH"
          description: High-severity findings only
        - value: "LOW"
          description: Low-severity findings only
      "__positional__":
        - value: "https://"
          description: HTTPS target URL

  dnsrecon:
    examples:
      - value: "dnsrecon -h"
        description: Show help and usage
      - value: "dnsrecon -d darklab.sh -t std"
        description: Standard DNS record enumeration
      - value: "dnsrecon -d darklab.sh -t axfr"
        description: Attempt zone transfer
      - value: "dnsrecon -d darklab.sh -t brt"
        description: Brute-force subdomain enumeration
    flags:
      - value: -h
        description: Show help and usage
      - value: -d
        description: Target domain
      - value: -t
        description: Discovery mode
      - value: -n
        description: Specific name server to query
      - value: -D
        description: Wordlist for brute force mode
    expects_value:
      - -d
      - -t
      - -n
      - -D
    arg_hints:
      "-d":
        - value: "<domain>"
          description: Target domain to enumerate
      "-t":
        - value: "std"
          description: Standard DNS record checks
        - value: "axfr"
          description: Attempt zone transfer
        - value: "brt"
          description: Brute-force subdomains
        - value: "srv"
          description: Enumerate SRV records
        - value: "zonewalk"
          description: Attempt DNSSEC zone walk
        - value: "crt"
          description: Query certificate transparency data
      "__positional__":
        - value: "<domain>"
          description: Usually provided through -d

  dnsenum:
    examples:
      - value: "dnsenum -h"
        description: Show help and usage
      - value: "dnsenum --noreverse darklab.sh"
        description: Enumerate without reverse lookups
      - value: "dnsenum --enum darklab.sh"
        description: Full enumeration set
      - value: "dnsenum --dnsserver 8.8.8.8 darklab.sh"
        description: Enumerate using Google's public resolver
    flags:
      - value: -h
        description: Show help and usage
      - value: --noreverse
        description: Skip reverse lookups
      - value: --enum
        description: Run full enumeration set
      - value: --dnsserver
        description: Query a specific resolver
      - value: --threads
        description: Number of worker threads
    expects_value:
      - --dnsserver
      - --threads
    arg_hints:
      "--dnsserver":
        - value: "8.8.8.8"
          description: Example public resolver
      "__positional__":
        - value: "<domain>"
          description: Domain name to enumerate

  dnsx:
    examples:
      - value: "dnsx -h"
        description: Show help and usage
      - value: "dnsx -d darklab.sh -w /usr/share/wordlists/seclists/Discovery/DNS/subdomains-top1million-5000.txt"
        description: Brute-force subdomains with a wordlist
      - value: "dnsx -d darklab.sh -w /usr/share/wordlists/seclists/Discovery/DNS/subdomains-top1million-5000.txt -resp"
        description: Brute-force subdomains and show DNS responses
      - value: "dnsx -d darklab.sh -w /usr/share/wordlists/seclists/Discovery/DNS/subdomains-top1million-5000.txt -a -resp"
        description: Filter for A records and show responses
    flags:
      - value: -h
        description: Show help and usage
      - value: -d
        description: Target domain
      - value: -w
        description: Wordlist for brute force
      - value: -resp
        description: Show DNS responses
      - value: -a
        description: Query A records
      - value: -cname
        description: Query CNAME records
      - value: -mx
        description: Query MX records
    expects_value:
      - -d
      - -w
    arg_hints:
      "-d":
        - value: "<domain>"
          description: Target domain to enumerate
      "-w":
        - value: "/usr/share/wordlists/seclists/Discovery/DNS/subdomains-top1million-5000.txt"
          description: Common subdomain wordlist
      "__positional__":
        - value: "<domain>"
          description: Usually provided through -d

  fierce:
    examples:
      - value: "fierce -h"
        description: Show help and usage
      - value: "fierce --domain darklab.sh"
        description: Enumerate subdomains for a domain
      - value: "fierce --domain darklab.sh --dns-servers 8.8.8.8"
        description: Enumerate using a specific resolver
      - value: "fierce --domain darklab.sh --traverse 5"
        description: Set traversal depth to 5
    flags:
      - value: -h
        description: Show help and usage
      - value: --domain
        description: Target domain
      - value: --dns-servers
        description: Resolver or name server to use
      - value: --traverse
        description: Maximum recursive traversal depth
    expects_value:
      - --domain
      - --dns-servers
      - --traverse
    arg_hints:
      "--domain":
        - value: "<domain>"
          description: Target domain to enumerate
      "--dns-servers":
        - value: "8.8.8.8"
          description: Example resolver address

  subfinder:
    examples:
      - value: "subfinder -h"
        description: Show help and usage
      - value: "subfinder -d darklab.sh"
        description: Discover subdomains for a domain
      - value: "subfinder -d darklab.sh -silent"
        description: Subdomain discovery with minimal output
    flags:
      - value: -h
        description: Show help and usage
      - value: -d
        description: Target domain
      - value: -silent
        description: Minimal output
      - value: -recursive
        description: Recurse through discovered subdomains
      - value: -all
        description: Use all available sources
    expects_value:
      - -d
    arg_hints:
      "-d":
        - value: "<domain>"
          description: Target domain to enumerate

  pd-httpx:
    examples:
      - value: "pd-httpx -h"
        description: Show help and usage
      - value: "pd-httpx -u https://ip.darklab.sh -title -status-code -tech-detect"
        description: Full recon — title, status code, and tech fingerprint
      - value: "pd-httpx -u https://ip.darklab.sh -status-code"
        description: Check HTTP status code
      - value: "pd-httpx -u https://ip.darklab.sh -follow-redirects"
        description: Follow and report redirects
    flags:
      - value: -h
        description: Show help and usage
      - value: -u
        description: Single target URL
      - value: -title
        description: Show page title
      - value: -status-code
        description: Show HTTP status code
      - value: -tech-detect
        description: Detect technologies
      - value: -follow-redirects
        description: Follow redirects
    expects_value:
      - -u
    arg_hints:
      "-u":
        - value: "https://"
          description: Start an HTTP or HTTPS URL

  nikto:
    examples:
      - value: "nikto -h ip.darklab.sh -p 443 -ssl"
        description: Scan HTTPS target on port 443
      - value: "nikto -h ip.darklab.sh -Tuning 1"
        description: Scan for interesting files only
      - value: "nikto -h ip.darklab.sh -maxtime 120"
        description: Time-limited scan of two minutes
    flags:
      - value: -h
        description: Target host or URL
      - value: -p
        description: Target port
      - value: -ssl
        description: Force SSL mode
      - value: -Tuning
        description: Select tuning category set
      - value: -maxtime
        description: Maximum scan duration
    expects_value:
      - -h
      - -p
      - -Tuning
      - -maxtime
    arg_hints:
      "-h":
        - value: "<host>"
          description: Target host, hostname, or URL
      "-p":
        - value: "443"
          description: Common HTTPS port
        - value: "8080"
          description: Common alternate HTTP port
      "-Tuning":
        - value: "1"
          description: Interesting file checks
        - value: "4"
          description: Injection checks

  wpscan:
    examples:
      - value: "wpscan -h"
        description: Show help and usage
      - value: "wpscan --url https://ip.darklab.sh --enumerate vp"
        description: Enumerate vulnerable plugins
      - value: "wpscan --url https://ip.darklab.sh --enumerate u"
        description: Enumerate WordPress users
      - value: "wpscan --url https://ip.darklab.sh --detection-mode aggressive"
        description: Aggressive detection mode
    flags:
      - value: -h
        description: Show help and usage
      - value: --url
        description: Target WordPress URL
      - value: --enumerate
        description: Enumerate selected object types
      - value: --detection-mode
        description: Detection mode strategy
      - value: --force
        description: Scan even if WordPress is not detected
    expects_value:
      - --url
      - --enumerate
      - --detection-mode
    arg_hints:
      "--url":
        - value: "https://"
          description: Target WordPress URL
      "--enumerate":
        - value: "p"
          description: Enumerate plugins
        - value: "u"
          description: Enumerate users
        - value: "t"
          description: Enumerate themes
        - value: "vp"
          description: Enumerate vulnerable plugins
        - value: "ap"
          description: Enumerate all plugins
      "--detection-mode":
        - value: "aggressive"
          description: Aggressive detection mode

  gobuster:
    examples:
      - value: "gobuster -h"
        description: Show help and usage
      - value: "gobuster dir -u https://ip.darklab.sh -w /usr/share/wordlists/seclists/Discovery/Web-Content/common.txt"
        description: Directory brute force with common wordlist
      - value: "gobuster vhost -u https://ip.darklab.sh -w /usr/share/wordlists/seclists/Discovery/DNS/subdomains-top1million-5000.txt"
        description: Virtual host brute force
    flags:
      - value: -h
        description: Show help and usage
      - value: dir
        description: Directory or file brute force mode
      - value: vhost
        description: Virtual host brute force mode
      - value: -u
        description: Target URL
      - value: -w
        description: Wordlist path
      - value: -x
        description: File extensions to append
      - value: -k
        description: Skip TLS certificate verification
    expects_value:
      - -u
      - -w
      - -x
    arg_hints:
      "-u":
        - value: "https://"
          description: Target base URL
      "-w":
        - value: "/usr/share/wordlists/seclists/Discovery/Web-Content/common.txt"
          description: Common web-content wordlist
        - value: "/usr/share/wordlists/seclists/Discovery/DNS/subdomains-top1million-5000.txt"
          description: Common virtual-host wordlist
      "-x":
        - value: "php,html,txt"
          description: Common extension list

  fping:
    examples:
      - value: "fping -h"
        description: Show help and usage
      - value: "fping -c 4 darklab.sh"
        description: Send 4 probes with a summary
      - value: "fping -s darklab.sh"
        description: Probe with summary stats only
      - value: "fping -e darklab.sh"
        description: Show elapsed time per reply
    flags:
      - value: -h
        description: Show help and usage
      - value: -c
        description: Count and summary mode
      - value: -s
        description: Print summary only
      - value: -e
        description: Show elapsed time
      - value: -t
        description: Timeout per target
    expects_value:
      - -c
      - -t
    arg_hints:
      "-c":
        - value: "4"
          description: Send four probes
      "__positional__":
        - value: "<host>"
          description: Hostname or IP to probe

  sslscan:
    examples:
      - value: "sslscan -h"
        description: Show help and usage
      - value: "sslscan ip.darklab.sh"
        description: Full TLS scan of a host
      - value: "sslscan --no-failed ip.darklab.sh"
        description: Scan but suppress failed cipher output
    flags:
      - value: -h
        description: Show help and usage
      - value: --tls12
        description: Only test TLS 1.2
      - value: --tls13
        description: Only test TLS 1.3
      - value: --no-failed
        description: Suppress failed cipher output
      - value: --show-certificate
        description: Display the full certificate chain
      - value: --bugs
        description: Enable SSL implementation bug workarounds
      - value: --timeout
        description: Socket timeout in seconds
    expects_value:
      - --timeout
    arg_hints:
      "--timeout":
        - value: "10"
          description: Ten-second socket timeout
      "__positional__":
        - value: "<host>"
          description: Hostname or host:port to scan

  sslyze:
    examples:
      - value: "sslyze --help"
        description: Show help and usage
      - value: "sslyze --certinfo ip.darklab.sh"
        description: Validate the certificate chain
      - value: "sslyze --heartbleed ip.darklab.sh"
        description: Test for the Heartbleed vulnerability
    flags:
      - value: --help
        description: Show help and usage
      - value: --certinfo
        description: Retrieve and validate the certificate chain
      - value: --heartbleed
        description: Test for the Heartbleed vulnerability
      - value: --robot
        description: Test for the ROBOT vulnerability
      - value: --http_headers
        description: Test for security HTTP headers
      - value: --early_data
        description: Test for TLS 1.3 0-RTT early data support
      - value: --compression
        description: Test for TLS compression (CRIME)
      - value: --reneg
        description: Test for insecure TLS renegotiation
      - value: --tlsv1_2
        description: Run TLS 1.2 cipher suite scan
      - value: --tlsv1_3
        description: Run TLS 1.3 cipher suite scan
    arg_hints:
      "__positional__":
        - value: "<host>"
          description: Hostname or host:port to scan

  wafw00f:
    examples:
      - value: "wafw00f --help"
        description: Show help and usage
      - value: "wafw00f https://darklab.sh"
        description: Check darklab.sh for a WAF
    flags:
      - value: --help
        description: Show help and usage
      - value: -a
        description: Find all matching WAFs (do not stop at first)
      - value: -v
        description: Verbose output
      - value: -r
        description: Disable automatic redirect following
      - value: -t
        description: Test for a specific WAF product
    expects_value:
      - -t
    arg_hints:
      "-t":
        - value: "<waf-name>"
          description: Specific WAF to test for (e.g. Cloudflare)
      "__positional__":
        - value: "https://"
          description: Target URL to fingerprint

  naabu:
    examples:
      - value: "naabu -help"
        description: Show help and usage
      - value: "naabu -host ip.darklab.sh -p 80,443"
        description: Scan web ports on a host
      - value: "naabu -host ip.darklab.sh -silent"
        description: Scan with minimal output
    flags:
      - value: -help
        description: Show help and usage
      - value: -host
        description: Target host or IP
      - value: -p
        description: Ports or port ranges to scan
      - value: -rate
        description: Packets per second rate limit
      - value: -silent
        description: Minimal output
      - value: -v
        description: Verbose output
      - value: -exclude-ports
        description: Ports to exclude from scan
    expects_value:
      - -host
      - -p
      - -rate
      - -exclude-ports
    arg_hints:
      "-host":
        - value: "<host>"
          description: Target hostname or IP address
      "-p":
        - value: "80,443"
          description: Common web ports
        - value: "1-1000"
          description: First thousand ports
        - value: "-"
          description: All 65535 ports
      "-rate":
        - value: "100"
          description: Conservative rate limit
        - value: "500"
          description: Moderate rate limit
      "__positional__":
        - value: "<target>"
          description: Usually provided through -host

  katana:
    examples:
      - value: "katana -help"
        description: Show help and usage
      - value: "katana -u https://ip.darklab.sh -d 1 -silent"
        description: Shallow crawl with minimal output
    flags:
      - value: -help
        description: Show help and usage
      - value: -u
        description: Single target URL to crawl
      - value: -d
        description: Maximum crawl depth
      - value: -jc
        description: Enable JavaScript parsing and crawling
      - value: -kf
        description: Crawl known files (robots.txt, sitemap.xml, etc.)
      - value: -ef
        description: Exclude file extensions
      - value: -ct
        description: Concurrency level
      - value: -timeout
        description: Request timeout in seconds
      - value: -silent
        description: Suppress banner and output headers
    expects_value:
      - -u
      - -d
      - -ef
      - -ct
      - -timeout
    arg_hints:
      "-u":
        - value: "https://"
          description: Target URL to start crawling from
      "-d":
        - value: "2"
          description: Shallow crawl depth
        - value: "3"
          description: Moderate crawl depth
        - value: "5"
          description: Deep crawl
      "-kf":
        - value: "all"
          description: All known file types
      "__positional__":
        - value: "<target>"
          description: Usually provided through -u

  masscan:
    examples:
      - value: "masscan --help"
        description: Show help and usage
      - value: "masscan -p 80,443 8.8.8.8"
        description: Fast scan of web ports
    flags:
      - value: --help
        description: Show help and usage
      - value: -p
        description: Ports or port ranges to scan
      - value: --rate
        description: Transmit rate in packets per second
      - value: --banner
        description: Capture service banners
      - value: --exclude
        description: Exclude a host or range from scanning
    expects_value:
      - -p
      - --rate
      - --exclude
    arg_hints:
      "-p":
        - value: "80,443"
          description: Common web ports
        - value: "1-1000"
          description: First thousand ports
        - value: "1-65535"
          description: Full port range
      "--rate":
        - value: "500"
          description: Conservative rate
        - value: "1000"
          description: Moderate rate
      "__positional__":
        - value: "<target>"
          description: IP address or CIDR range

  rustscan:
    examples:
      - value: "rustscan --help"
        description: Show help and usage
      - value: "rustscan -a ip.darklab.sh -p 80,443"
        description: Scan specific ports on a host
    flags:
      - value: --help
        description: Show help and usage
      - value: -a
        description: Target address or IP
      - value: -p
        description: Specific ports to scan
      - value: --range
        description: Port range to scan
      - value: -b
        description: Batch size (ports scanned simultaneously)
      - value: --ulimit
        description: File descriptor ulimit override
      - value: -t
        description: Timeout per port in milliseconds
    expects_value:
      - -a
      - -p
      - --range
      - -b
      - --ulimit
      - -t
    arg_hints:
      "-a":
        - value: "<host>"
          description: Target hostname or IP address
      "-p":
        - value: "80,443"
          description: Common web ports
      "--range":
        - value: "1-1000"
          description: First thousand ports
        - value: "1-65535"
          description: Full port range
      "-b":
        - value: "500"
          description: Conservative batch size
      "-t":
        - value: "1500"
          description: 1.5 second per-port timeout
      "__positional__":
        - value: "<target>"
          description: Usually provided through -a

