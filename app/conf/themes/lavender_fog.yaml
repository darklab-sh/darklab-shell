# darklab_shell — Light Theme: Lavender Fog
# Cool lilac grays with stronger identity and teal-green accent.
# Pass 2 revision: panel_bg deepened to make lavender visible, green shifted
# to teal so it reads against the lilac bg, blue pulled toward purple for
# harmony, borders deepened, filter inverted.

label: "Lavender Fog"
color_scheme: light
group: "Cool Light"
sort: 60

bg: "#f2f0f8"
surface: "#fdfcff"
border: "rgba(66, 61, 92, 0.22)"
border_bright: "rgba(66, 61, 92, 0.36)"
border_soft: "rgba(66, 61, 92, 0.12)"
text: "#1f1c2e"
muted: "#5f5b72"
green: "#3c7a6e"
green_dim: "#58897f"
green_glow: "rgba(60, 122, 110, 0.10)"
amber: "#9e6b28"
red: "#b84266"
blue: "#5f6db0"
terminal_font_size: "14px"
terminal_line_height: "1.65"
prompt_line_text: "#1f1c2e"

panel_bg: "#e6e1f0"
panel_border: "rgba(66, 61, 92, 0.22)"
panel_shadow: "rgba(66, 61, 92, 0.16)"
terminal_bar_bg: "#d2cae5"

chrome_bg: "#d2cae5"
chrome_header_bg: "#d2cae5"
chrome_row_bg: "#d2cae5"
chrome_row_hover_bg: "rgba(95, 109, 176, 0.08)"
chrome_control_bg: "color-mix(in srgb, var(--surface) 92%, transparent)"
chrome_control_border: "var(--border-bright)"
chrome_divider_color: "var(--border)"

toolbar_button_bg: "#e5e0f2"
toolbar_button_border: "#cbc3de"
toolbar_button_text: "#3c3854"
toolbar_button_hover_bg: "#d9d1eb"
toolbar_button_hover_border: "#9488b0"
toolbar_button_hover_text: "#1f1c2e"
toolbar_button_active_bg: "#cbc0e2"
toolbar_button_active_border: "#7f73a0"
toolbar_button_active_text: "#121029"


tabs_bar_scrollbar_track: "rgba(66, 61, 92, 0.12)"
tabs_bar_scrollbar_thumb: "#8c82a8"
tabs_bar_scrollbar_thumb_hover: "#6c6288"
tab_bg: "linear-gradient(180deg, rgba(255,255,255,0.78), rgba(230,225,240,0.92))"
tab_border: "rgba(66, 61, 92, 0.22)"
tab_text: "#5f5b72"
tab_hover_text: "#1f1c2e"
tab_active_bg: "#ddd4ed"
tab_active_border: "#7f73a0"
tab_active_text: "#121029"
tab_active_shadow: "inset 0 0 0 1px rgba(255,255,255,0.50)"
tab_close_bg: "rgba(255,255,255,0.55)"
tab_close_border: "rgba(66, 61, 92, 0.12)"
tab_close_hover_bg: "rgba(95,109,176,0.12)"
tab_close_hover_border: "rgba(95,109,176,0.28)"
tab_close_hover_text: "inherit"
tab_touch_drag_text_shadow: "0 0 10px rgba(95,109,176,0.14)"
tab_drop_shadow: "0 0 10px rgba(95,109,176,0.22)"

chrome_shadow: "rgba(66, 61, 92, 0.28)"
history_load_overlay_bg: "rgba(20, 18, 31, 0.72)"

modal_bg: "#fbfaff"

dropdown_bg: "#e6e1f0"
dropdown_border: "rgba(95, 109, 176, 0.30)"
dropdown_shadow: "rgba(66, 61, 92, 0.18)"
dropdown_item_text: "#4d4a62"
overlay_backdrop_bg: "rgba(20, 18, 31, 0.72)"

inline_surface_bg: "#e2dcee"

toast_bg: "#f8f7fc"
toast_text: "#3c7a6e"
toast_border: "rgba(66, 61, 92, 0.26)"
toast_error_bg: "#fff7f8"
toast_error_text: "#b84266"
toast_error_border: "rgba(184, 66, 102, 0.36)"


welcome_ascii_color: "var(--green)"
welcome_command_hover_bg: "rgba(95, 109, 176, 0.08)"
welcome_command_hover_shadow: "0 0 0 1px rgba(95, 109, 176, 0.18)"
welcome_ascii_text_shadow: "0 0 10px rgba(60,122,110,0.16), 0 1px 0 rgba(255,255,255,0.55)"
welcome_ascii_filter: "saturate(1.15) contrast(1.10) brightness(0.94)"

# Action / selection text colors
on_accent_text: "#000"
selection_text: "#f7fff2"
selection_line_text: "#eef7ee"
modal_danger_btn_text: "#fff"
modal_warning_btn_text: "#000"
