# darklab_shell — Light Theme: Mint Glass
# Crisp pale mint and cool gray — lightest-touch revision of the set.
# Pass 2 revision: saturation bumped, cleaner red, borders deepened,
# filter inverted.

label: "Mint Glass"
color_scheme: light
group: "Cool Light"
sort: 70

bg: "#eef8f4"
surface: "#fbfffd"
border: "rgba(43, 79, 71, 0.22)"
border_bright: "rgba(43, 79, 71, 0.36)"
border_soft: "rgba(43, 79, 71, 0.12)"
text: "#192724"
muted: "#56665f"
green: "#2a8a6e"
green_dim: "#4a9583"
green_glow: "rgba(42, 138, 110, 0.10)"
amber: "#9f6b1e"
red: "#b8434c"
blue: "#3a7196"
terminal_font_size: "14px"
terminal_line_height: "1.65"
prompt_line_text: "#192724"

panel_bg: "#e0f0e9"
panel_border: "rgba(43, 79, 71, 0.22)"
panel_shadow: "rgba(43, 79, 71, 0.16)"
terminal_bar_bg: "#cfe5dd"

chrome_bg: "#cfe5dd"
chrome_header_bg: "#cfe5dd"
chrome_row_bg: "#cfe5dd"
chrome_row_hover_bg: "rgba(58, 113, 150, 0.08)"
chrome_control_bg: "color-mix(in srgb, var(--surface) 92%, transparent)"
chrome_control_border: "var(--border-bright)"
chrome_divider_color: "var(--border)"

toolbar_button_bg: "#dff0ea"
toolbar_button_border: "#bfd8cf"
toolbar_button_text: "#2f4842"
toolbar_button_hover_bg: "#cfe7df"
toolbar_button_hover_border: "#7fae9d"
toolbar_button_hover_text: "#192724"
toolbar_button_active_bg: "#b8d8cc"
toolbar_button_active_border: "#6f9a88"
toolbar_button_active_text: "#0e1f1c"


tabs_bar_scrollbar_track: "rgba(43, 79, 71, 0.12)"
tabs_bar_scrollbar_thumb: "#7da193"
tabs_bar_scrollbar_thumb_hover: "#5c8272"
tab_bg: "linear-gradient(180deg, rgba(255,255,255,0.78), rgba(224,240,233,0.92))"
tab_border: "rgba(43, 79, 71, 0.22)"
tab_text: "#56665f"
tab_hover_text: "#192724"
tab_active_bg: "#d5ebe3"
tab_active_border: "#6f9a88"
tab_active_text: "#0e1f1c"
tab_active_shadow: "inset 0 0 0 1px rgba(255,255,255,0.50)"
tab_close_bg: "rgba(255,255,255,0.55)"
tab_close_border: "rgba(43, 79, 71, 0.12)"
tab_close_hover_bg: "rgba(42,138,110,0.12)"
tab_close_hover_border: "rgba(42,138,110,0.28)"
tab_close_hover_text: "inherit"
tab_touch_drag_text_shadow: "0 0 10px rgba(42,138,110,0.14)"
tab_drop_shadow: "0 0 10px rgba(42,138,110,0.22)"

chrome_shadow: "rgba(43, 79, 71, 0.28)"
history_load_overlay_bg: "rgba(17, 27, 24, 0.72)"

modal_bg: "#f9fffc"

dropdown_bg: "#e0f0e9"
dropdown_border: "rgba(42, 138, 110, 0.28)"
dropdown_shadow: "rgba(43, 79, 71, 0.18)"
dropdown_item_text: "#405752"
overlay_backdrop_bg: "rgba(17, 27, 24, 0.72)"

inline_surface_bg: "#dceee7"

toast_bg: "#f6fcf9"
toast_text: "#2a8a6e"
toast_border: "rgba(43, 79, 71, 0.26)"
toast_error_bg: "#fff7f7"
toast_error_text: "#b8434c"
toast_error_border: "rgba(184, 67, 76, 0.36)"


welcome_ascii_color: "var(--green)"
welcome_command_hover_bg: "rgba(42, 138, 110, 0.08)"
welcome_command_hover_shadow: "0 0 0 1px rgba(42, 138, 110, 0.20)"
welcome_ascii_text_shadow: "0 0 10px rgba(42,138,110,0.16), 0 1px 0 rgba(255,255,255,0.55)"
welcome_ascii_filter: "saturate(1.15) contrast(1.10) brightness(0.94)"

# Action / selection text colors
on_accent_text: "#000"
selection_text: "#f7fff2"
selection_line_text: "#eef7ee"
modal_danger_btn_text: "#fff"
modal_warning_btn_text: "#000"
