tabs_scroll_btn_bg: "#f2dfc9"
tabs_scroll_btn_border: "#ddc3a8"
tabs_scroll_btn_text: "#54402f"
tabs_scroll_btn_hover_bg: "#ebd2b6"
tabs_scroll_btn_hover_border: "#b8896a"
tabs_scroll_btn_hover_text: "#1f140b"
