# darklab_shell — Light Theme: Apricot Sand
# Warm desert paper tones with terracotta accents.
# Pass 2 revision: surface stack widened, muted darkened to AA, accents
# saturation-boosted, welcome filter inverted, warm-mono prompt identity.

label: "Apricot Sand"
color_scheme: light
group: "Warm Light"
sort: 10

bg: "#fbf2e8"
surface: "#fffaf3"
border: "rgba(102, 74, 52, 0.22)"
border_bright: "rgba(102, 74, 52, 0.36)"
border_soft: "rgba(102, 74, 52, 0.12)"
text: "#2a1f18"
muted: "#6b5845"
green: "#5d6f4a"
green_dim: "#768764"
green_glow: "rgba(93, 111, 74, 0.10)"
amber: "#b35a1e"
red: "#c2553f"
blue: "#5a7aa0"
terminal_font_size: "14px"
terminal_line_height: "1.65"
prompt_line_text: "#392b23"

panel_bg: "#f1e3d0"
panel_border: "rgba(102, 74, 52, 0.22)"
panel_shadow: "rgba(102, 74, 52, 0.16)"
terminal_bar_bg: "#e7d2b9"

chrome_bg: "#e7d2b9"
chrome_header_bg: "#e7d2b9"
chrome_row_bg: "#e7d2b9"
chrome_row_hover_bg: "rgba(179, 90, 30, 0.08)"
chrome_control_bg: "color-mix(in srgb, var(--surface) 92%, transparent)"
chrome_control_border: "var(--border-bright)"
chrome_divider_color: "var(--border)"

toolbar_button_bg: "#f2dfc9"
toolbar_button_border: "#ddc3a8"
toolbar_button_text: "#54402f"
toolbar_button_hover_bg: "#ebd2b6"
toolbar_button_hover_border: "#b8896a"
toolbar_button_hover_text: "#2a1f18"
toolbar_button_active_bg: "#dfc2a0"
toolbar_button_active_border: "#a07554"
toolbar_button_active_text: "#1f140b"

# Button primitives
button_secondary_bg: "color-mix(in srgb, var(--surface) 66%, transparent)"
button_secondary_border: "color-mix(in srgb, var(--border-bright) 88%, transparent)"
button_secondary_text: "color-mix(in srgb, var(--muted) 86%, var(--text))"
button_secondary_hover_bg: "color-mix(in srgb, var(--_tone) 7%, transparent)"
button_secondary_hover_border: "color-mix(in srgb, var(--_tone-dim) 72%, var(--border-bright))"
button_ghost_border: "color-mix(in srgb, var(--border-bright) 58%, transparent)"
button_ghost_text: "color-mix(in srgb, var(--muted) 86%, var(--text))"
button_ghost_hover_bg: "color-mix(in srgb, var(--_tone) 10%, transparent)"
button_ghost_hover_border: "color-mix(in srgb, var(--_tone-dim) 62%, var(--border-bright))"
button_destructive_bg: "color-mix(in srgb, var(--_tone) 8%, transparent)"
button_destructive_text: "color-mix(in srgb, var(--muted) 86%, var(--text))"
button_destructive_hover_bg: "color-mix(in srgb, var(--_tone) 16%, transparent)"


tab_text: "#6b5845"
tab_hover_text: "#2a1f18"
tab_active_bg: "#f3e1cc"
tab_close_bg: "rgba(255,255,255,0.55)"
tab_close_border: "rgba(102, 74, 52, 0.12)"
tab_close_hover_bg: "rgba(179,90,30,0.12)"
tab_close_hover_border: "rgba(179,90,30,0.28)"
tab_close_hover_text: "inherit"
tab_touch_drag_text_shadow: "0 0 10px rgba(179,90,30,0.14)"
tab_drop_shadow: "0 0 10px rgba(179,90,30,0.22)"

chrome_shadow: "rgba(102, 74, 52, 0.28)"
scrollbar_track: "color-mix(in srgb, var(--surface) 72%, transparent)"
scrollbar_thumb: "color-mix(in srgb, var(--muted) 44%, var(--border-bright))"
scrollbar_thumb_hover: "color-mix(in srgb, var(--text) 38%, var(--border-bright))"
history_load_overlay_bg: "rgba(29, 20, 15, 0.72)"

modal_bg: "#fff8f0"

dropdown_bg: "#f1e3d0"
dropdown_border: "rgba(179, 90, 30, 0.28)"
dropdown_border_soft: "rgba(26,90,170,0.18)"
dropdown_shadow: "rgba(102, 74, 52, 0.18)"
dropdown_shadow_ring: "color-mix(in srgb, var(--theme-dropdown-shadow) 24%, transparent)"
dropdown_shadow_ring_strong: "color-mix(in srgb, var(--theme-dropdown-shadow) 36%, transparent)"
dropdown_item_text: "#54402f"
overlay_backdrop_bg: "rgba(29, 20, 15, 0.72)"

# Search highlights
search_highlight_bg: "rgba(154,66,0,0.18)"
search_highlight_current_bg: "rgba(154,66,0,0.34)"
search_signal_bg: "rgba(154,66,0,0.08)"
search_signal_accent: "rgba(154,66,0,0.28)"
search_signal_current_bg: "rgba(154,66,0,0.14)"
search_signal_current_accent: "rgba(154,66,0,0.42)"

inline_surface_bg: "#f0e1cc"

toast_bg: "#fff8f2"
toast_text: "#5d6f4a"
toast_border: "rgba(102, 74, 52, 0.26)"
toast_error_bg: "#fff5f2"
toast_error_text: "#c2553f"
toast_error_border: "rgba(194, 85, 63, 0.36)"
toast_shadow: "0 12px 28px color-mix(in srgb, var(--theme-panel-shadow) 74%, transparent)"


# Warm-mono identity move: welcome ASCII uses terracotta, not green.
welcome_ascii_color: "var(--amber)"
welcome_command_hover_bg: "rgba(179, 90, 30, 0.08)"
welcome_command_hover_shadow: "0 0 0 1px rgba(179, 90, 30, 0.16)"
welcome_ascii_text_shadow: "0 0 10px rgba(179,90,30,0.14), 0 1px 0 rgba(255,255,255,0.50)"
welcome_ascii_filter: "saturate(1.15) contrast(1.10) brightness(0.94)"

# Action / selection text colors
on_accent_text: "#000"
selection_text: "#f7fff2"
selection_line_text: "#eef7ee"
modal_danger_btn_text: "#fff"
modal_warning_btn_text: "#000"
