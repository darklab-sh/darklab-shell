mobile_composer_host_bg: "linear-gradient(180deg, rgba(241,227,208,0.95), rgba(255,248,242,0.99))"
mobile_composer_host_light_bg: "linear-gradient(180deg, rgba(241,227,208,0.95), rgba(255,248,242,0.99))"
mobile_menu_bg: "#fff8f0"
mobile_menu_border: "rgba(102, 74, 52, 0.26)"
mobile_menu_shadow: "rgba(102, 74, 52, 0.24)"
mobile_menu_button_border: "#ddc3a8"
mobile_menu_button_hover_bg: "var(--bg)"
mobile_menu_button_hover_text: "#1f140b"

# Warm-mono identity move: welcome ASCII uses terracotta, not green.
welcome_ascii_color: "var(--amber)"
welcome_command_hover_bg: "rgba(179, 90, 30, 0.08)"
welcome_command_hover_shadow: "0 0 0 1px rgba(179, 90, 30, 0.16)"
welcome_ascii_text_shadow: "0 0 10px rgba(179,90,30,0.14), 0 1px 0 rgba(255,255,255,0.50)"
welcome_ascii_filter: "saturate(1.15) contrast(1.10) brightness(0.94)"
