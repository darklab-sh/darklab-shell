# darklab_shell — Light Theme: Apricot Sand
# Warm desert paper tones with terracotta accents.
# Pass 2 revision: surface stack widened, muted darkened to AA, accents
# saturation-boosted, welcome filter inverted, warm-mono prompt identity.

label: "Apricot Sand"
color_scheme: light
group: "Warm Light"
sort: 10

bg: "#fbf2e8"
surface: "#fffaf3"
border: "rgba(102, 74, 52, 0.22)"
border_bright: "rgba(102, 74, 52, 0.36)"
border_soft: "rgba(102, 74, 52, 0.12)"
text: "#2a1f18"
muted: "#6b5845"
green: "#5d6f4a"
green_dim: "#768764"
green_glow: "rgba(93, 111, 74, 0.10)"
amber: "#b35a1e"
red: "#c2553f"
blue: "#5a7aa0"
terminal_font_size: "14px"
terminal_line_height: "1.65"
prompt_line_text: "#392b23"

panel_bg: "#f1e3d0"
panel_alt_bg: "#e7d2b9"
panel_border: "rgba(102, 74, 52, 0.22)"
panel_shadow: "rgba(102, 74, 52, 0.16)"
terminal_bar_bg: "#e7d2b9"
terminal_bar_border: "#c8a887"
terminal_actions_bg: "rgba(102, 74, 52, 0.03)"
terminal_wrap_border: "rgba(102, 74, 52, 0.32)"
terminal_wrap_shadow: "rgba(102, 74, 52, 0.22)"
window_btn_close: "color-mix(in srgb, var(--red) 62%, var(--surface))"
window_btn_minimize: "color-mix(in srgb, var(--amber) 62%, var(--surface))"
window_btn_maximize: "color-mix(in srgb, var(--green) 62%, var(--surface))"

status_bar_bg: "#e7d2b9"
status_bar_border: "rgba(102, 74, 52, 0.26)"
status_bar_text: "#6b5845"

toolbar_button_bg: "#f2dfc9"
