# darklab_shell — Dark Theme: Emerald Obsidian
# ------------------------------------------------
# A deep black-green variant with a vivid emerald accent.
label: Emerald Obsidian
color_scheme: dark
group: Dark Neon
sort: 1
bg: '#050905'
surface: '#0d1410'
border: rgba(72, 161, 110, 0.22)
border_bright: rgba(72, 161, 110, 0.36)
border_soft: "rgba(255, 255, 255, 0.08)"
text: '#ddeae3'
muted: '#99aaa1'
green: '#35d07f'
green_dim: '#2a7b50'
green_glow: rgba(53, 208, 127, 0.12)
amber: '#c9a04c'
red: '#dd5e57'
blue: '#62a6ff'
chrome_bg: "#090f0b"
chrome_header_bg: "#090f0b"
chrome_row_bg: "#090f0b"
chrome_row_hover_bg: rgba(53,208,127,0.12)
chrome_control_bg: "color-mix(in srgb, var(--surface) 92%, transparent)"
chrome_control_border: "var(--border-bright)"
chrome_divider_color: "var(--border)"
welcome_ascii_color: "var(--green)"
terminal_font_size: 14px
terminal_line_height: '1.65'
prompt_line_text: '#eef6f0'
panel_bg: '#0d1410'
panel_border: rgba(72, 161, 110, 0.22)
panel_shadow: rgba(170,170,170,0.11)
terminal_bar_bg: '#050905'
toolbar_button_bg: transparent
toolbar_button_border: '#334139'
toolbar_button_text: '#99aaa1'
toolbar_button_hover_bg: transparent
toolbar_button_hover_border: '#2a7b50'
toolbar_button_hover_text: '#35d07f'
toolbar_button_active_bg: rgba(53,208,127,0.06)
toolbar_button_active_border: '#2a7b50'
toolbar_button_active_text: '#35d07f'
tabs_bar_scrollbar_track: rgba(255,255,255,0.05)
tabs_bar_scrollbar_thumb: '#586a60'
tabs_bar_scrollbar_thumb_hover: '#73867b'
tab_bg: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01))
tab_border: '#334139'
tab_text: '#99aaa1'
tab_hover_text: '#ddeae3'
tab_active_bg: rgba(53,208,127,0.05)
tab_active_border: rgba(53,208,127,0.36)
tab_active_text: '#35d07f'
tab_active_shadow: none
tab_close_bg: rgba(255,255,255,0.02)
tab_close_border: rgba(255,255,255,0.06)
tab_close_hover_bg: color-mix(in srgb, var(--green-dim) 18%, transparent)
tab_close_hover_border: color-mix(in srgb, var(--green-dim) 30%, transparent)
tab_close_hover_text: inherit
tab_touch_drag_text_shadow: 0 0 10px color-mix(in srgb, var(--green) 14%, transparent)
tab_drop_shadow: 0 0 10px color-mix(in srgb, var(--green) 45%, transparent)
chrome_shadow: rgba(156,188,170,0.18)
history_load_overlay_bg: rgba(0,0,0,0.76)
modal_bg: '#141414'
dropdown_bg: color-mix(in srgb, var(--surface) 96%, transparent)
dropdown_border: color-mix(in srgb, var(--green) 18%, transparent)
dropdown_shadow: rgba(0,0,0,0.35)
dropdown_item_text: '#9a9a9a'
overlay_backdrop_bg: rgba(0,0,0,0.76)
inline_surface_bg: '#141414'
toast_bg: '#141414'
toast_text: '#39ff14'
toast_border: '#1a7a08'
toast_error_bg: color-mix(in srgb, var(--red) 8%, var(--bg))
toast_error_text: '#ff3c3c'
toast_error_border: color-mix(in srgb, var(--red) 45%, transparent)
welcome_command_hover_bg: color-mix(in srgb, var(--green) 6%, transparent)
welcome_command_hover_shadow: 0 0 0 1px var(--green-glow)
welcome_ascii_text_shadow: 0 0 10px color-mix(in srgb, var(--green) 14%, transparent),
  0 0 4px color-mix(in srgb, var(--green) 18%, transparent), 0 1px 0 rgba(8,16,12,0.4)
welcome_ascii_filter: saturate(1.12) contrast(1.08) brightness(1.08)

# Action / selection text colors
on_accent_text: "#000"
selection_text: "#f7fff2"
selection_line_text: "#eef7ee"
modal_danger_btn_text: "#fff"
modal_warning_btn_text: "#000"
