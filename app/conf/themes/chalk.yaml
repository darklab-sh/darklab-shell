# darklab_shell — Light Theme: Chalk
# True-neutral cool gray with saturated accents.
# Pass 2 revision: green/blue/red saturation restored, surface stack widened,
# borders deepened, filter inverted.

label: "Chalk"
color_scheme: light
group: "Neutral Light"
sort: 90

bg: "#f0f0f2"
surface: "#fafafb"
border: "rgba(30, 30, 50, 0.22)"
border_bright: "rgba(30, 30, 50, 0.36)"
border_soft: "rgba(30, 30, 50, 0.12)"
text: "#121218"
muted: "#5a5c6c"
green: "#2a7060"
green_dim: "#458074"
green_glow: "rgba(42, 112, 96, 0.10)"
amber: "#8a6010"
red: "#c02e2e"
blue: "#2b4f95"
terminal_font_size: "14px"
terminal_line_height: "1.65"
prompt_line_text: "#121218"

panel_bg: "#dcdce2"
panel_alt_bg: "#cacad2"
panel_border: "rgba(30, 30, 50, 0.22)"
panel_shadow: "rgba(30, 30, 50, 0.16)"
terminal_bar_bg: "#cacad2"
terminal_bar_border: "#9090a0"
terminal_actions_bg: "rgba(30, 30, 50, 0.03)"
terminal_wrap_border: "rgba(30, 30, 50, 0.32)"
terminal_wrap_shadow: "rgba(30, 30, 50, 0.22)"
window_btn_close: "color-mix(in srgb, var(--red) 62%, var(--surface))"
window_btn_minimize: "color-mix(in srgb, var(--amber) 62%, var(--surface))"
window_btn_maximize: "color-mix(in srgb, var(--green) 62%, var(--surface))"

