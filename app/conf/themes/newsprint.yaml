# darklab_shell — Light Theme: Newsprint
# Editorial grayscale paper. Pass 2 signature move: BLACK prompt, ASCII in
# ink-black. Green reserved for Run button + success. Surface stack widened,
# borders deepened, filter inverted.

label: "Newsprint"
color_scheme: light
group: "Neutral Light"
sort: 100

bg: "#f4f4f1"
surface: "#fefefc"
border: "rgba(66, 68, 70, 0.22)"
border_bright: "rgba(66, 68, 70, 0.36)"
border_soft: "rgba(66, 68, 70, 0.12)"
text: "#141516"
muted: "#5a6064"
green: "#3f7060"
green_dim: "#5e826f"
green_glow: "rgba(63, 112, 96, 0.10)"
amber: "#8f6527"
red: "#b34545"
blue: "#455d80"
terminal_font_size: "14px"
terminal_line_height: "1.65"
# Editorial identity: true-ink prompt rather than the subdued slate used by
# the other neutrals. Matches welcome_ascii_color.
prompt_line_text: "#141516"

panel_bg: "#e6e6e0"
panel_border: "rgba(66, 68, 70, 0.22)"
panel_shadow: "rgba(66, 68, 70, 0.16)"
terminal_bar_bg: "#d5d5cd"

chrome_bg: "#d5d5cd"
chrome_header_bg: "#d5d5cd"
chrome_row_bg: "#d5d5cd"
chrome_row_hover_bg: "rgba(69, 93, 128, 0.08)"
chrome_control_bg: "color-mix(in srgb, var(--surface) 92%, transparent)"
chrome_control_border: "var(--border-bright)"
chrome_divider_color: "var(--border)"

toolbar_button_bg: "#e6e6de"
toolbar_button_border: "#cecec5"
toolbar_button_text: "#38403f"
toolbar_button_hover_bg: "#d7d7ce"
toolbar_button_hover_border: "#8c908f"
toolbar_button_hover_text: "#141516"
toolbar_button_active_bg: "#c9cbc5"
toolbar_button_active_border: "#787e7d"
toolbar_button_active_text: "#0a0c0d"


tabs_bar_scrollbar_track: "rgba(66, 68, 70, 0.12)"
tabs_bar_scrollbar_thumb: "#8c908f"
tabs_bar_scrollbar_thumb_hover: "#6a6f6e"
tab_bg: "linear-gradient(180deg, rgba(255,255,255,0.78), rgba(230,230,224,0.92))"
tab_border: "rgba(66, 68, 70, 0.22)"
tab_text: "#5a6064"
tab_hover_text: "#141516"
tab_active_bg: "#dcdcd4"
tab_active_border: "#787e7d"
tab_active_text: "#0a0c0d"
tab_active_shadow: "inset 0 0 0 1px rgba(255,255,255,0.50)"
tab_close_bg: "rgba(255,255,255,0.55)"
tab_close_border: "rgba(66, 68, 70, 0.12)"
tab_close_hover_bg: "rgba(63,112,96,0.12)"
tab_close_hover_border: "rgba(63,112,96,0.28)"
tab_close_hover_text: "inherit"
tab_touch_drag_text_shadow: "0 0 10px rgba(63,112,96,0.14)"
tab_drop_shadow: "0 0 10px rgba(63,112,96,0.22)"

chrome_shadow: "rgba(66, 68, 70, 0.28)"
history_load_overlay_bg: "rgba(23, 24, 25, 0.72)"

modal_bg: "#fbfbf8"

dropdown_bg: "#e6e6e0"
dropdown_border: "rgba(69, 93, 128, 0.28)"
dropdown_shadow: "rgba(66, 68, 70, 0.18)"
dropdown_item_text: "#4a5054"
overlay_backdrop_bg: "rgba(23, 24, 25, 0.72)"

inline_surface_bg: "#e2e2da"

toast_bg: "#f8f8f5"
toast_text: "#3f7060"
toast_border: "rgba(66, 68, 70, 0.26)"
toast_error_bg: "#fdf7f7"
toast_error_text: "#b34545"
toast_error_border: "rgba(179, 69, 69, 0.36)"


# Editorial signature: ASCII in ink-black, not green.
welcome_ascii_color: "var(--text)"
welcome_command_hover_bg: "rgba(69, 93, 128, 0.08)"
welcome_command_hover_shadow: "0 0 0 1px rgba(69, 93, 128, 0.20)"
welcome_ascii_text_shadow: "0 0 0 transparent, 0 1px 0 rgba(255,255,255,0.60)"
welcome_ascii_filter: "saturate(1.15) contrast(1.10) brightness(0.94)"

# Action / selection text colors
on_accent_text: "#000"
selection_text: "#f7fff2"
selection_line_text: "#eef7ee"
modal_danger_btn_text: "#fff"
modal_warning_btn_text: "#000"
