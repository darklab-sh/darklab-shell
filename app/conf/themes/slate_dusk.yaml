# darklab shell — Dark Theme: Slate Dusk
# -------------------------------------------------
# Cool blue-grey mid-dark. Overcast city at twilight — slate roofs, wet pavement, streetlight reflections. Sits between the deep obsidians and the light neutrals.

label: "Slate Dusk"
color_scheme: dark
group: "Dark Mid-tone"
sort: 7

bg: "#363e4a"
surface: "#424a58"
border: "#4e5766"
border_bright: "#626b7a"
border_soft: "#3e4654"
text: "#e2e6ee"
muted: "#a0adbf"
green: "#7ec9d8"
green_dim: "#4f8d9a"
green_glow: "rgba(126,201,216,0.14)"
amber: "#e0b060"
red: "#ef7a7a"
blue: "#8cb4f0"
terminal_font_size: "14px"
terminal_line_height: "1.65"
prompt_line_text: "#e8ecf4"

panel_bg: "#2e3642"
panel_border: "#4e5766"
panel_shadow: "rgba(0,0,0,0.35)"
terminal_bar_bg: "#262d38"

chrome_bg: "#262d38"
chrome_header_bg: "#262d38"
chrome_row_bg: "#262d38"
chrome_row_hover_bg: "rgba(126,201,216,0.06)"
chrome_control_bg: "color-mix(in srgb, var(--surface) 92%, transparent)"
chrome_control_border: "var(--border-bright)"
chrome_divider_color: "var(--border)"

toolbar_button_bg: "transparent"
toolbar_button_border: "#4e5766"
toolbar_button_text: "#a0adbf"
toolbar_button_hover_bg: "rgba(126,201,216,0.08)"
toolbar_button_hover_border: "#4f8d9a"
toolbar_button_hover_text: "#7ec9d8"
toolbar_button_active_bg: "rgba(126,201,216,0.12)"
toolbar_button_active_border: "#4f8d9a"
toolbar_button_active_text: "#a4d4df"


tabs_bar_scrollbar_track: "rgba(255,255,255,0.06)"
tabs_bar_scrollbar_thumb: "#6d6d6d"
tabs_bar_scrollbar_thumb_hover: "#8a8a8a"
tab_bg: "linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01))"
tab_border: "#4e5766"
tab_text: "#a0adbf"
tab_hover_text: "#e2e6ee"
tab_active_bg: "rgba(255,255,255,0.05)"
tab_active_border: "#4f8d9a"
tab_active_text: "#7ec9d8"
tab_active_shadow: "none"
tab_close_bg: "rgba(255,255,255,0.02)"
tab_close_border: "rgba(255,255,255,0.06)"
tab_close_hover_bg: "color-mix(in srgb, var(--green) 12%, transparent)"
tab_close_hover_border: "color-mix(in srgb, var(--green) 22%, transparent)"
tab_close_hover_text: "inherit"
tab_touch_drag_text_shadow: "0 0 10px color-mix(in srgb, var(--green) 16%, transparent)"
tab_drop_shadow: "0 0 10px color-mix(in srgb, var(--green) 40%, transparent)"

chrome_shadow: "rgba(0,0,0,0.5)"
history_load_overlay_bg: "rgba(0,0,0,0.72)"

modal_bg: "#242a34"

dropdown_bg: "#242a34"
dropdown_border: "color-mix(in srgb, var(--blue) 22%, transparent)"
dropdown_shadow: "rgba(0,0,0,0.4)"
dropdown_item_text: "#a0adbf"
overlay_backdrop_bg: "rgba(0,0,0,0.72)"

inline_surface_bg: "#2e3642"

toast_bg: "#424a58"
toast_text: "#7ec9d8"
toast_border: "#4f8d9a"
toast_error_bg: "#424a58"
toast_error_text: "#ef7a7a"
toast_error_border: "color-mix(in srgb, var(--red) 45%, transparent)"


welcome_ascii_color: "var(--green)"
welcome_command_hover_bg: "rgba(126,201,216,0.06)"
welcome_command_hover_shadow: "0 0 0 1px var(--green-glow)"
welcome_ascii_text_shadow: "0 0 8px color-mix(in srgb, var(--green) 14%, transparent), 0 1px 0 rgba(10,14,20,0.4)"
welcome_ascii_filter: "saturate(1.05) contrast(1.04) brightness(1.02)"

# Action / selection text colors
on_accent_text: "#000"
selection_text: "#f7fff2"
selection_line_text: "#eef7ee"
modal_danger_btn_text: "#fff"
modal_warning_btn_text: "#000"
