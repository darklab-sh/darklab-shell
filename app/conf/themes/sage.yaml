tabs_scroll_btn_border: "#808c78"
tabs_scroll_btn_text: "#2a3424"
tabs_scroll_btn_hover_bg: "#98a488"
tabs_scroll_btn_hover_border: "#66725a"
tabs_scroll_btn_hover_text: "#0c130a"
tab_bg: "linear-gradient(180deg, color-mix(in srgb, #c4cfb6 75%, transparent), color-mix(in srgb, #acb89e 92%, transparent))"
