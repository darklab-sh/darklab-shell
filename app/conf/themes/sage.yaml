mobile_composer_host_bg: "linear-gradient(180deg, color-mix(in srgb, #acb89e 95%, transparent), color-mix(in srgb, #b4c0a6 99%, transparent))"
mobile_composer_host_light_bg: "linear-gradient(180deg, color-mix(in srgb, #acb89e 95%, transparent), color-mix(in srgb, #b4c0a6 99%, transparent))"
mobile_menu_bg: "#bdc8b0"
mobile_menu_border: "rgba(20,30,16,0.38)"
mobile_menu_shadow: "rgba(14,22,10,0.22)"
