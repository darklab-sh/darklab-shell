# darklab_shell — Light Theme: Olive Grove
# Natural greens with parchment neutrals and terracotta punctuation.
# Pass 2 revision: olive saturated, red shifted to terracotta for cohesion,
# surface stack widened, borders deepened, filter inverted.

label: "Olive Grove"
color_scheme: light
group: "Warm Light"
sort: 20

bg: "#f3f2ea"
surface: "#fcfbf6"
border: "rgba(70, 82, 58, 0.22)"
border_bright: "rgba(70, 82, 58, 0.36)"
border_soft: "rgba(70, 82, 58, 0.12)"
text: "#1f281f"
muted: "#5c6658"
green: "#587a42"
green_dim: "#6a8360"
green_glow: "rgba(88, 122, 66, 0.12)"
amber: "#a96a26"
red: "#c2543d"
blue: "#46698a"
terminal_font_size: "14px"
terminal_line_height: "1.65"
prompt_line_text: "#1f281f"

panel_bg: "#e7e5d2"
panel_border: "rgba(70, 82, 58, 0.22)"
panel_shadow: "rgba(70, 82, 58, 0.16)"
terminal_bar_bg: "#d5dbc6"

chrome_bg: "#d5dbc6"
chrome_header_bg: "#d5dbc6"
chrome_row_bg: "#d5dbc6"
chrome_row_hover_bg: "rgba(88, 122, 66, 0.08)"
chrome_control_bg: "color-mix(in srgb, var(--surface) 92%, transparent)"
chrome_control_border: "var(--border-bright)"
chrome_divider_color: "var(--border)"

toolbar_button_bg: "#e1e6d9"
toolbar_button_border: "#c3ccbb"
toolbar_button_text: "#3a4a3a"
toolbar_button_hover_bg: "#d4ddca"
toolbar_button_hover_border: "#8ca185"
toolbar_button_hover_text: "#1f281f"
toolbar_button_active_bg: "#c3d0b8"
toolbar_button_active_border: "#7a9170"
toolbar_button_active_text: "#141f14"


tabs_bar_scrollbar_track: "rgba(70, 82, 58, 0.12)"
tabs_bar_scrollbar_thumb: "#8a9a7d"
tabs_bar_scrollbar_thumb_hover: "#687a5c"
tab_bg: "linear-gradient(180deg, rgba(255,255,250,0.78), rgba(231,229,210,0.92))"
tab_border: "rgba(70, 82, 58, 0.22)"
tab_text: "#5c6658"
tab_hover_text: "#1f281f"
tab_active_bg: "#dde2ce"
tab_active_border: "#7a9170"
tab_active_text: "#141f14"
tab_active_shadow: "inset 0 0 0 1px rgba(255,255,255,0.50)"
tab_close_bg: "rgba(255,255,255,0.55)"
tab_close_border: "rgba(70, 82, 58, 0.12)"
tab_close_hover_bg: "rgba(88,122,66,0.14)"
tab_close_hover_border: "rgba(88,122,66,0.30)"
tab_close_hover_text: "inherit"
tab_touch_drag_text_shadow: "0 0 10px rgba(88,122,66,0.14)"
tab_drop_shadow: "0 0 10px rgba(88,122,66,0.24)"

chrome_shadow: "rgba(70, 82, 58, 0.28)"
history_load_overlay_bg: "rgba(23, 29, 23, 0.72)"

modal_bg: "#faf9f2"

dropdown_bg: "#e7e5d2"
dropdown_border: "rgba(88, 122, 66, 0.32)"
dropdown_shadow: "rgba(70, 82, 58, 0.18)"
dropdown_item_text: "#4a5648"
overlay_backdrop_bg: "rgba(23, 29, 23, 0.72)"

inline_surface_bg: "#e3e8d3"

toast_bg: "#f6f7f1"
toast_text: "#3a5b24"
toast_border: "rgba(70, 82, 58, 0.26)"
toast_error_bg: "#f7f2f1"
toast_error_text: "#c2543d"
toast_error_border: "rgba(194, 84, 61, 0.38)"


welcome_ascii_color: "var(--green)"
welcome_command_hover_bg: "rgba(88, 122, 66, 0.08)"
welcome_command_hover_shadow: "0 0 0 1px rgba(88, 122, 66, 0.20)"
welcome_ascii_text_shadow: "0 0 10px rgba(88,122,66,0.18), 0 1px 0 rgba(255,255,255,0.55)"
welcome_ascii_filter: "saturate(1.15) contrast(1.10) brightness(0.94)"

# Action / selection text colors
on_accent_text: "#000"
selection_text: "#f7fff2"
selection_line_text: "#eef7ee"
modal_danger_btn_text: "#fff"
modal_warning_btn_text: "#000"
