# darklab shell — Light Theme: Overcast
# -------------------------------------------------
# Cool mid-grey light. Flat sky before a storm, poured concrete, aluminium. A calmer, less glaring option than the near-white lights.

label: "Overcast"
color_scheme: light
group: "Neutral Mid-tone"
sort: 75

bg: "#b6bcc3"
surface: "#c6cbd1"
border: "rgba(20,24,34,0.22)"
