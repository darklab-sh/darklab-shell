services:
  redis:
    image: redis:7-alpine
    container_name: redis-darklab
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  shell:
    build:
      context: .
      args:
        APP_PORT: ${APP_PORT:-8888}
    container_name: darklab_shell
    init: true
    ports:
      - "${APP_PORT:-8888}:${APP_PORT:-8888}"
    volumes:
      - ./app:/app:ro
      - ./data:/data
    tmpfs:
      - /tmp
    cap_add:
      - NET_RAW
      - NET_ADMIN
    read_only: true
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_PORT=${APP_PORT:-8888}
      # Must match app/conf/config.yaml workspace_root when customized.
      # The entrypoint uses this path to normalize workspace permissions before
      # dropping privileges; the app uses workspace_root for runtime access.
      # Set WORKSPACE_ROOT directly here, in an override, or via .env.
      - WORKSPACE_ROOT=${WORKSPACE_ROOT:-/tmp/darklab_shell-workspaces}
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:${APP_PORT:-8888}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
