services:
  redis:
    image: redis:7-alpine
    container_name: shell.darklab.sh-redis
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  shell.darklab.sh:
    build: .
    container_name: shell.darklab.sh
    read_only: true
    restart: always
    expose:
      - "8888"
    volumes:
      - ./app:/app:ro # Mount the app directory as read-only
      - ./data:/data  # Writable volume for persistent SQLite run history
    tmpfs:
      - /tmp
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - REDIS_URL=redis://redis:6379/0
      - VIRTUAL_HOST=sh.darklab.sh,shell.darklab.sh,sh.0g.gg,shell.0g.gg
      - LETSENCRYPT_HOST=sh.darklab.sh,shell.darklab.sh,sh.0g.gg,shell.0g.gg
      # Keep SSE connections alive through nginx-proxy for long-running commands
      - PROXY_READ_TIMEOUT=3600
      - PROXY_SEND_TIMEOUT=3600
      - PROXY_CONNECT_TIMEOUT=3600
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "gelf"
      options:
        gelf-address: "udp://loghost.darklab.sh:12201/"
networks:
  default:
    external: true
    name: darklab-net
