default:
  tags:
    - self-hosted

image: python:3.12-slim

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

stages:
  - test
  - lint
  - audit
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/

before_script:
  - pip install -q -r app/requirements.txt -r requirements-dev.txt

test-py-pytest:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - pytest tests/py/ -v

test-js-unit:
  stage: test
  image: node:22-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - npm ci
  cache:
    key: "node-$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm run test:unit

test-js-e2e:
  stage: test
  image: python:3.12
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y -q nodejs iputils-ping
    - pip install -q -r app/requirements.txt -r requirements-dev.txt
    - npm ci
    - npx playwright install --with-deps chromium
  script:
    - npm run test:e2e
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 1 week

lint:
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - flake8 app/ tests/py/
    - bandit -r app/ -ll -q

audit:
  stage: audit
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - pip install -q pip-audit
    - pip-audit -r app/requirements.txt

dependency-version-check:
  stage: audit
  before_script:
    - apt-get update -q
    - apt-get install -y -q nodejs npm
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
    - when: manual
      allow_failure: true
  script:
    - ./scripts/check_versions.sh | tee version-check.txt
  artifacts:
    when: always
    paths:
      - version-check.txt
    expire_in: 1 week

container-smoke-test:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache python3 py3-pytest py3-yaml
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
    - when: manual
      allow_failure: true
  script:
    - ./scripts/container_smoke_test.sh

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script: []
  rules:
    # Always build on the main branch so there is always a verified image
    - if: $CI_COMMIT_BRANCH == "main"
    # Always build for merge requests targeting main so the merge gate sees a build
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    # On other branches, only build when image-affecting files change
    - changes:
        - Dockerfile
        - app/requirements.txt
        - .dockerignore
        - docker-compose*.yml
    # Allow a manual trigger on any branch for one-off verification
    - when: manual
      allow_failure: true
  script:
    - docker build -t darklab-shell:$CI_COMMIT_SHA .
