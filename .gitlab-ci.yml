image: python:3.12-slim

stages:
  - test
  - lint
  - audit
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/

before_script:
  - pip install -q -r app/requirements.txt -r requirements-dev.txt

test:
  stage: test
  script:
    - pytest tests/ -v

test-js-unit:
  stage: test
  image: node:22-slim
  before_script:
    - npm ci
  cache:
    key: "node-$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
  script:
    - npm run test:unit

test-js-e2e:
  stage: test
  image: python:3.12
  before_script:
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y -q nodejs
    - pip install -q -r app/requirements.txt -r requirements-dev.txt
    - npm ci
    - npx playwright install --with-deps chromium
  script:
    - npm run test:e2e
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 1 week

lint:
  stage: lint
  script:
    - flake8 app/ tests/
    - bandit -r app/ -ll -q

audit:
  stage: audit
  script:
    - pip install -q pip-audit
    - pip-audit -r app/requirements.txt

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script: []
  script:
    - docker build -t shell.darklab.sh:$CI_COMMIT_SHA .
